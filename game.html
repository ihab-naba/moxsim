<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoxSim Arena - Goldfish</title>
    <style>
        :root {
            --bg-black: #000000;
            --zone-bg: #0d0d0d;
            --mox-blue: #007bff;
            --btn-purple: #9a73ef;
            --btn-red: #d11326;
            --text-gray: #888;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-black);
            font-family: -apple-system, system-ui, sans-serif;
            color: white; height: 100vh; overflow: hidden;
        }

        #arena-wrapper {
            display: grid;
            grid-template-columns: 1fr 280px;
            height: 100vh; padding: 10px; box-sizing: border-box; gap: 10px;
        }

        #play-area { display: flex; flex-direction: column; gap: 8px; height: 100%; }

        .main-zone {
            flex: 1.2; background-color: var(--zone-bg);
            border: 1px solid var(--mox-blue); border-radius: 12px;
            position: relative; display: flex; align-items: center; 
            padding: 20px 15px 5px 15px; gap: 8px; overflow-x: auto;
        }

        #bottom-row { height: 180px; display: flex; gap: 8px; margin-top: 5px; }

        #hand-zone {
            flex: 2.5; background-color: var(--zone-bg);
            border: 1px solid var(--mox-blue); border-radius: 8px;
            position: relative; display: flex; align-items: center; 
            padding: 0 10px; gap: 5px; overflow-x: auto;
        }

        .mini-zone {
            flex: 0.6; background-color: var(--zone-bg);
            border: 1px solid var(--mox-blue); border-radius: 8px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        .main-zone::before, #hand-zone::before, .mini-zone::before, #commander-box::before {
            content: attr(data-label); position: absolute;
            top: 6px; left: 10px; font-size: 9px;
            color: var(--text-gray); text-transform: uppercase; font-weight: bold; z-index: 10;
        }

        .card-img {
            height: 140px; border-radius: 6px; cursor: pointer;
            transition: transform 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        .card-img:hover { transform: translateY(-10px) scale(1.05); z-index: 100; }

        /* Animazione Shuffle */
        @keyframes shuffleMove {
            0% { transform: rotate(0deg) translateX(0); }
            25% { transform: rotate(5deg) translateX(10px); }
            75% { transform: rotate(-5deg) translateX(-10px); }
            100% { transform: rotate(0deg) translateX(0); }
        }
        .shuffling { animation: shuffleMove 0.3s ease-in-out infinite; }

        #sidebar {
            border: 1px solid var(--mox-blue); border-radius: 8px;
            display: flex; flex-direction: column; padding: 15px; gap: 10px;
        }

        .life-display { font-size: 50px; font-weight: 900; color: var(--mox-blue); text-align: center; }
        
        .pill-btn {
            background: linear-gradient(180deg, #b598f3 0%, #7d5bbe 100%);
            border: 1px solid #6a49ac; border-radius: 50px; color: white;
            padding: 10px; font-weight: bold; font-size: 13px; cursor: pointer;
        }
        .pill-btn.red { background: linear-gradient(180deg, #e63946 0%, #a30b18 100%); border: 1px solid #820914; }

        #commander-box { 
            margin-top: auto; height: 180px; 
            border: 1px solid var(--mox-blue); border-radius: 8px; 
            position: relative; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="arena-wrapper">
    <div id="play-area">
        <div class="main-zone" data-label="CREATURES" id="zone-creatures"></div>
        <div class="main-zone" data-label="OTHERS" id="zone-others"></div>
        <div class="main-zone" data-label="LAND" id="zone-lands"></div>
        
        <div id="bottom-row">
            <div id="hand-zone" data-label="LA TUA MANO"></div>
            <div class="mini-zone" data-label="MAZZO" id="library-zone"></div>
            <div class="mini-zone" data-label="CIMITERO" id="zone-graveyard"></div>
            <div class="mini-zone" data-label="ESILIO" id="zone-exile"></div>
        </div>
    </div>

    <div id="sidebar">
        <div style="text-align:right; font-size:10px; cursor:pointer;" onclick="location.href='index.html'">← ESCI</div>
        <div class="life-display" id="life-val">40</div>
        <div style="display:flex; justify-content:center; gap:10px; margin-bottom:10px;">
            <button class="pill-btn" style="width:45px" onclick="updateLife(-1)">-</button>
            <button class="pill-btn" style="width:45px" onclick="updateLife(1)">+</button>
        </div>

        <button class="pill-btn" onclick="animateShuffle()">Shuffle</button>
        <button class="pill-btn" onclick="drawCard()">Draw</button>
        <button class="pill-btn red" onclick="location.reload()">Restart</button>

        <div id="commander-box" data-label="COMMANDER"></div>
    </div>
</div>

<script>
    let library = [];
    let hand = [];
    let life = 40;

    async function init() {
        const params = new URLSearchParams(window.location.search);
        let deckUrl = params.get('deck');
        if (!deckUrl) return;

        const deckId = deckUrl.split('/').pop().split('?')[0];
        
        try {
            const resp = await fetch(`https://api.moxfield.com/v2/decks/all/${deckId}`);
            const data = await resp.json();
            
            // Carica Comandante
            if (data.commanders) {
                const cmdBox = document.getElementById('commander-box');
                Object.values(data.commanders).forEach(card => {
                    cmdBox.appendChild(createCardUI(card.card, 'commander'));
                });
            }

            // Popola Mazzo
            library = [];
            Object.values(data.mainboard).forEach(cardData => {
                for (let i = 0; i < cardData.quantity; i++) {
                    library.push(cardData.card);
                }
            });
            
            shuffleArray(library);
            updateLibraryUI();
            
            // Pesca 7 iniziali
            for(let i=0; i<7; i++) {
                if(library.length > 0) hand.push(library.pop());
            }
            updateHandUI();
            updateLibraryUI();

        } catch (e) {
            console.error("Errore:", e);
        }
    }

    function createCardUI(cardData, context) {
        const img = document.createElement('img');
        const scryId = cardData.scryfall_id;
        // Immagine retro se è nel mazzo, altrimenti fronte
        img.src = (context === 'library') 
            ? "https://deckmaster.info/images/cards/back.png" 
            : `https://api.scryfall.com/cards/${scryId}?format=image&version=normal`;
        
        img.className = 'card-img';
        if (context === 'hand') img.onclick = () => playCard(cardData);
        return img;
    }

    function animateShuffle() {
        const libZone = document.getElementById('library-zone');
        libZone.classList.add('shuffling');
        
        setTimeout(() => {
            shuffleArray(library);
            libZone.classList.remove('shuffling');
        }, 1000);
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function drawCard() {
        if (library.length === 0) return;
        hand.push(library.pop());
        updateHandUI();
        updateLibraryUI();
    }

    function updateHandUI() {
        const handDiv = document.querySelector('[data-label="LA TUA MANO"]');
        handDiv.innerHTML = '';
        hand.forEach(card => handDiv.appendChild(createCardUI(card, 'hand')));
    }

    function updateLibraryUI() {
        const libDiv = document.getElementById('library-zone');
        libDiv.innerHTML = '';
        if (library.length > 0) {
            libDiv.appendChild(createCardUI(library[library.length-1], 'library'));
        }
    }

    function playCard(cardData) {
        hand = hand.filter(c => c.scryfall_id !== cardData.scryfall_id || hand.indexOf(c) !== hand.indexOf(cardData));
        updateHandUI();

        let zoneId = 'zone-others';
        if (cardData.type_line.toLowerCase().includes('land')) zoneId = 'zone-lands';
        else if (cardData.type_line.toLowerCase().includes('creature')) zoneId = 'zone-creatures';

        document.getElementById(zoneId).appendChild(createCardUI(cardData, 'field'));
    }

    function updateLife(amt) {
        life += amt;
        document.getElementById('life-val').innerText = life;
    }

    window.onload = init;
</script>
</body>
</html>
