<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Goldfish V16 (Drag & Drop)</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #0b0b0b; --panel: #161616; --gray: #aaa; --sleeve-color: #1abc9c; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; }
        
        #arena { display: grid; grid-template-columns: 1fr 280px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 10px; }
        
        /* HEADER */
        #board-header { display: flex; align-items: center; padding: 0 5px; height: 35px; gap: 15px; }
        .turn-badge { background: #1a1a1a; border: 1px solid #333; padding: 4px 15px; border-radius: 4px; font-weight: bold; color: var(--mox-blue); font-size: 13px; }

        /* ZONES */
        .zone { 
            background: var(--panel); border: 1px solid #282828; border-radius: 6px; 
            position: relative; display: flex; align-items: center; padding: 30px 10px 10px; gap: 12px; flex: 1;
            min-height: 0; overflow-x: auto; transition: background 0.2s;
        }
        .zone.drag-over { background: #222; border-color: var(--mox-blue); }
        .zone::before { content: attr(data-label); position: absolute; top: 8px; left: 12px; font-size: 11px; color: var(--gray); font-weight: 600; text-transform: uppercase; }

        #bottom-bar { display: flex; height: 180px; gap: 10px; flex-shrink: 0; }
        
        /* HAND & PILES */
        #hand { flex: 2.5; justify-content: center; overflow: visible !important; }
        .pile-zone { flex: 0.6; display: flex; flex-direction: column; align-items: center; }
        .pile-label { font-size: 12px; margin-bottom: 5px; color: #eee; font-weight: bold; cursor: pointer; }
        .pile-visual { 
            width: 85px; height: 118px; border-radius: 8px; border: 1px solid #333; 
            background: #000; position: relative; cursor: pointer; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .sleeve { background: var(--sleeve-color); border: 2px solid #fff; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        /* CARDS */
        .card { height: 130px; border-radius: 8px; cursor: grab; flex-shrink: 0; transition: transform 0.2s, box-shadow 0.2s; user-select: none; }
        .card:active { cursor: grabbing; opacity: 0.8; }
        .hand-card { margin-right: -45px; }
        .hand-card:hover { transform: translateY(-70px) scale(2.2); z-index: 1000 !important; margin: 0 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .tapped { transform: rotate(90deg); margin: 0 30px; filter: brightness(0.6); }

        /* SIDEBAR */
        #sidebar { border-left: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #0c0c0c; }
        .life { font-size: 64px; text-align: center; font-weight: bold; margin: 10px 0; text-shadow: 0 0 20px rgba(0,123,255,0.4); }
        
        .btn { background: #2a2a2a; border: none; padding: 12px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn:hover { background: #3a3a3a; }
        .btn-blue { background: var(--mox-blue); }
        .btn-blue:hover { background: #0069d9; }
        .btn-red { background: #a82331; }

        #commander-zone { height: 140px; border: 1px solid #222; border-radius: 8px; display: flex; justify-content: center; align-items: center; margin-top: auto; background: #111; }

        /* SCRY MODAL */
        #scry-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .scry-actions { display: flex; gap: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="arena">
    <div id="board">
        <div id="board-header">
            <div class="turn-badge" id="turn-display">Turno 1</div>
            <div style="font-size: 12px; color: #555;">MoxSim Arena V16 • Goldfish</div>
        </div>
        
        <div class="zone" data-label="Creatures" id="field-creatures" ondragover="allowDrop(event)" ondrop="drop(event)" ondragleave="dragLeave(event)"></div>
        <div class="zone" data-label="Non-Creatures" id="field-others" ondragover="allowDrop(event)" ondrop="drop(event)" ondragleave="dragLeave(event)"></div>
        <div class="zone" data-label="Lands" id="field-lands" ondragover="allowDrop(event)" ondrop="drop(event)" ondragleave="dragLeave(event)"></div>
        
        <div id="bottom-bar">
            <div class="zone" data-label="Hand" id="hand" ondragover="allowDrop(event)" ondrop="drop(event)" ondragleave="dragLeave(event)"></div>
            
            <div class="pile-zone">
                <div class="pile-label" onclick="drawCard()">Library (<span id="count-lib">0</span>) ▾</div>
                <div class="pile-visual sleeve" id="lib-visual" onclick="drawCard()"></div>
                <select onchange="changeSleeve(this.value)" style="margin-top:5px; background:#000; color:#fff; border:1px solid #333; font-size:10px;">
                    <option value="#1abc9c">Green-Teal</option>
                    <option value="#2c3e50">Dark Blue</option>
                    <option value="#c0392b">Fire Red</option>
                    <option value="#ff69b4">Mox Pink</option>
                </select>
            </div>

            <div class="pile-zone">
                <div class="pile-label">Graveyard (<span id="count-grave">0</span>) ▾</div>
                <div class="pile-visual" id="grave-visual" ondragover="allowDrop(event)" ondrop="drop(event)" data-zone="grave"></div>
            </div>

            <div class="pile-zone">
                <div class="pile-label">Exile (<span id="count-exile">0</span>) ▾</div>
                <div class="pile-visual" id="exile-visual" ondragover="allowDrop(event)" ondrop="drop(event)" data-zone="exile"></div>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div style="text-align:right; font-size: 11px; color: #555; cursor:pointer" onclick="window.location.href='index.html'">← ESCI</div>
        <div class="life" id="life-display">40</div>
        <div style="display:flex; gap:8px;">
            <button class="btn" style="flex:1" onclick="changeLife(-1)">-</button>
            <button class="btn" style="flex:1" onclick="changeLife(1)">+</button>
        </div>
        <button class="btn btn-blue" onclick="nextTurn()">Next Turn</button>
        <button class="btn" onclick="openScry()">Scry 1</button>
        <button class="btn" onclick="shuffleDeck()">Shuffle</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn-red btn" onclick="location.reload()">Restart</button>
        <div id="commander-zone" data-label="COMMANDER" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
    </div>
</div>

<div id="scry-overlay">
    <h2 id="scry-title">Scry 1</h2>
    <div id="scry-content"></div>
    <div class="scry-actions">
        <button class="btn btn-blue" onclick="scryAction('top')">Metti Sopra</button>
        <button class="btn" onclick="scryAction('bottom')">Metti Sotto</button>
        <button class="btn btn-red" onclick="closeScry()">Annulla</button>
    </div>
</div>

<script>
    let deck = [], hand = [], grave = [], exile = [];
    let life = 40, turn = 1;
    let draggedCardData = null;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let deckUrl = urlParams.get('deck');
        if (!deckUrl) return;
        const deckId = deckUrl.match(/\/decks\/([^?\/]+)/)?.[1] || deckUrl.split('/').pop();
        
        try {
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent(`https://api.moxfield.com/v2/decks/all/${deckId}`);
            const response = await fetch(proxy + target);
            const json = await response.json();
            const data = JSON.parse(json.contents);

            if (data.commanders) {
                Object.values(data.commanders).forEach(c => {
                    document.getElementById('commander-zone').appendChild(createCardUI(c.card, 'commander'));
                });
            }

            deck = [];
            Object.values(data.mainboard).forEach(info => {
                for (let i = 0; i < info.quantity; i++) { deck.push(info.card); }
            });

            shuffleArray(deck);
            for(let i=0; i<7; i++) { if(deck.length > 0) hand.push(deck.pop()); }
            updateUI();
        } catch (err) { alert("Errore caricamento."); }
    }

    function createCardUI(cardData, location) {
        const img = document.createElement('img');
        const scryId = cardData.scryfall_id;
        img.src = `https://api.scryfall.com/cards/${scryId}?format=image&version=normal`;
        img.className = 'card ' + (location === 'hand' ? 'hand-card' : '');
        img.draggable = true;
        img.dataset.cardId = scryId;
        img.dataset.face = "front";

        // Drag events
        img.ondragstart = (e) => {
            draggedCardData = cardData;
            e.dataTransfer.setData("text/plain", scryId);
            img.style.opacity = "0.4";
        };
        img.ondragend = () => { img.style.opacity = "1"; document.querySelectorAll('.zone').forEach(z => z.classList.remove('drag-over')); };

        // Tap & Flip
        img.onclick = (e) => {
            if (img.parentElement.id.includes('field')) img.classList.toggle('tapped');
        };
        img.oncontextmenu = (e) => {
            e.preventDefault();
            const hasBack = cardData.card_faces && cardData.card_faces.length > 1;
            img.dataset.face = img.dataset.face === "front" ? "back" : "front";
            img.src = img.dataset.face === "back" 
                ? (hasBack ? `https://api.scryfall.com/cards/${scryId}?format=image&version=normal&face=back` : `https://cards.scryfall.io/large/back.jpg`)
                : `https://api.scryfall.com/cards/${scryId}?format=image&version=normal`;
        };

        return img;
    }

    // DRAG & DROP LOGIC
    function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    
    function drop(e) {
        e.preventDefault();
        const zone = e.currentTarget;
        zone.classList.remove('drag-over');
        
        if (!draggedCardData) return;

        // Se droppato su Cimitero o Esilio (Pile)
        if (zone.dataset.zone === 'grave') {
            grave.push(draggedCardData);
            zone.innerHTML = `<img src="https://api.scryfall.com/cards/${draggedCardData.scryfall_id}?format=image&version=small" style="width:100%">`;
            removeFromSource(draggedCardData);
        } else if (zone.dataset.zone === 'exile') {
            exile.push(draggedCardData);
            zone.innerHTML = `<img src="https://api.scryfall.com/cards/${draggedCardData.scryfall_id}?format=image&version=small" style="width:100%">`;
            removeFromSource(draggedCardData);
        } else {
            // Se droppato in una zona campo o mano
            const newCard = createCardUI(draggedCardData, zone.id === 'hand' ? 'hand' : 'field');
            zone.appendChild(newCard);
            removeFromSource(draggedCardData);
        }
        
        updateUI();
    }

    function removeFromSource(cardData) {
        const hIdx = hand.findIndex(c => c.scryfall_id === cardData.scryfall_id);
        if (hIdx > -1) hand.splice(hIdx, 1);
        // Rimuove visivamente se era in campo
        document.querySelectorAll('.card').forEach(c => {
            if(c.dataset.cardId === cardData.scryfall_id && c.style.opacity === "0.4") c.remove();
        });
    }

    // UI & ACTIONS
    function updateUI() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = '';
        hand.forEach(c => handDiv.appendChild(createCardUI(c, 'hand')));
        document.getElementById('count-lib').innerText = deck.length;
        document.getElementById('count-grave').innerText = grave.length;
        document.getElementById('count-exile').innerText = exile.length;
    }

    function nextTurn() {
        turn++;
        document.getElementById('turn-display').innerText = `Turno ${turn}`;
        document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped'));
        drawCard();
    }

    function openScry() {
        if (deck.length === 0) return;
        const card = deck[deck.length - 1];
        const overlay = document.getElementById('scry-overlay');
        overlay.style.display = 'flex';
        document.getElementById('scry-content').innerHTML = `<img src="https://api.scryfall.com/cards/${card.scryfall_id}?format=image&version=normal" style="height:350px; border-radius:15px">`;
    }

    function scryAction(pos) {
        const card = deck.pop();
        if (pos === 'top') deck.push(card);
        else deck.unshift(card);
        closeScry();
        updateUI();
    }

    function closeScry() { document.getElementById('scry-overlay').style.display = 'none'; }
    function changeLife(v) { life += v; document.getElementById('life-display').innerText = life; }
    function drawCard() { if (deck.length > 0) { hand.push(deck.pop()); updateUI(); } }
    function shuffleDeck() { shuffleArray(deck); updateUI(); }
    function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
    function changeSleeve(color) { document.documentElement.style.setProperty('--sleeve-color', color); }

    window.onload = init;
</script>
</body>
</html>
