<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Goldfish V21 (Visual Auto-Tap)</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #0b0b0b; --panel: #161616; --gray: #aaa; --sleeve-color: #1abc9c; --valid: #2ecc71; --invalid: #e74c3c; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #arena { display: grid; grid-template-columns: 1fr 280px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 10px; }
        
        .zone { background: var(--panel); border: 1px solid #282828; border-radius: 8px; position: relative; display: flex; align-items: center; padding: 30px 10px 10px; gap: 12px; flex: 1; min-height: 0; overflow-x: auto; transition: 0.3s; }
        .zone::before { content: attr(data-label); position: absolute; top: 8px; left: 12px; font-size: 11px; color: var(--gray); font-weight: bold; text-transform: uppercase; }

        #bottom-bar { display: flex; height: 180px; gap: 10px; flex-shrink: 0; }
        #hand { flex: 2.5; justify-content: center; overflow: visible !important; }

        /* CARDS & HIGHLIGHTS */
        .card { height: 130px; border-radius: 8px; cursor: grab; flex-shrink: 0; transition: transform 0.2s, box-shadow 0.3s, border 0.3s; user-select: none; border: 2px solid transparent; }
        .hand-card { margin-right: -45px; }
        .hand-card:hover { transform: translateY(-70px) scale(2.2); z-index: 1000 !important; margin: 0 40px; }
        
        /* Stato Giocabilità */
        .can-cast { border-color: var(--valid) !important; box-shadow: 0 0 15px var(--valid); }
        .cant-cast { border-color: var(--invalid) !important; opacity: 0.8; }
        
        .tapped { transform: rotate(90deg); margin: 0 30px; filter: brightness(0.5); border-color: transparent !important; box-shadow: none !important; }

        #sidebar { border-left: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #0c0c0c; }
        .life { font-size: 60px; text-align: center; font-weight: bold; margin: 10px 0; color: white; }
        .btn { background: #2a2a2a; border: none; padding: 12px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-blue { background: var(--mox-blue); }
        
        .pile-zone { flex: 0.6; display: flex; flex-direction: column; align-items: center; }
        .pile-visual { width: 85px; height: 118px; border-radius: 8px; border: 1px solid #333; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .sleeve { background: var(--sleeve-color); border: 2px solid #fff; }
    </style>
</head>
<body>

<div id="arena">
    <div id="board">
        <div class="zone" data-label="Creatures" id="field-creatures"></div>
        <div class="zone" data-label="Non-Creatures" id="field-others"></div>
        <div class="zone" data-label="Lands" id="field-lands"></div>
        
        <div id="bottom-bar">
            <div class="zone" data-label="Hand" id="hand"></div>
            <div class="pile-zone">
                <div style="font-size:10px; margin-bottom:5px">Library (<span id="count-lib">0</span>)</div>
                <div class="pile-visual sleeve" onclick="drawCard()"></div>
            </div>
            <div class="pile-zone">
                <div style="font-size:10px; margin-bottom:5px">Graveyard (<span id="count-grave">0</span>)</div>
                <div class="pile-visual" id="grave-visual"></div>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="life" id="life-display">40</div>
        <button class="btn btn-blue" onclick="nextTurn()">Next Turn</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn" onclick="untapAll()">Untap All</button>
        <button class="btn" style="background:#a82331" onclick="location.reload()">Restart</button>
    </div>
</div>

<script>
    let deck = [], hand = [], grave = [], life = 40;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let deckUrl = urlParams.get('deck') || "";
        const deckId = deckUrl.match(/\/decks\/([^?\/]+)/)?.[1] || deckUrl.split('/').pop();
        if (!deckId) return;

        try {
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent(`https://api.moxfield.com/v2/decks/all/${deckId}`);
            const response = await fetch(proxy + target);
            const json = await response.json();
            const data = JSON.parse(json.contents);

            deck = [];
            Object.values(data.mainboard).forEach(info => {
                for (let i = 0; i < info.quantity; i++) { deck.push(info.card); }
            });

            shuffleArray(deck);
            for(let i=0; i<7; i++) { if(deck.length > 0) hand.push(deck.pop()); }
            updateUI();
        } catch (err) { console.error("Errore mazzo"); }
    }

    function calculateCMC(manaCost) {
        if (!manaCost || typeof manaCost !== 'string') return 0;
        let cmc = 0;
        const matches = manaCost.match(/\{(.+?)\}/g);
        if (!matches) return 0;
        matches.forEach(m => {
            const val = m.replace('{', '').replace('}', '');
            if (!isNaN(val)) cmc += parseInt(val); else cmc += 1;
        });
        return cmc;
    }

    function updateCardHighlights() {
        const untappedLands = document.querySelectorAll('#field-lands .card:not(.tapped)').length;
        const handCards = document.querySelectorAll('#hand .card');

        handCards.forEach(img => {
            const cardData = JSON.parse(img.dataset.cardData);
            const type = (cardData.type_line || "").toLowerCase();
            
            if (type.includes('land')) {
                img.classList.remove('can-cast', 'cant-cast');
            } else {
                const cost = calculateCMC(cardData.mana_cost);
                if (untappedLands >= cost) {
                    img.classList.add('can-cast');
                    img.classList.remove('cant-cast');
                } else {
                    img.classList.add('cant-cast');
                    img.classList.remove('can-cast');
                }
            }
        });
    }

    function createCardUI(cardData, location) {
        const img = document.createElement('img');
        img.src = `https://api.scryfall.com/cards/${cardData.scryfall_id}?format=image&version=normal`;
        img.className = 'card ' + (location === 'hand' ? 'hand-card' : '');
        img.dataset.cardData = JSON.stringify(cardData); // Salviamo i dati per il ricalcolo

        img.onclick = () => {
            const parent = img.parentElement.id;
            if (parent === 'hand') {
                const type = (cardData.type_line || "").toLowerCase();
                const cost = calculateCMC(cardData.mana_cost);
                
                if (!type.includes('land')) {
                    const untapped = Array.from(document.querySelectorAll('#field-lands .card:not(.tapped)'));
                    if (untapped.length < cost) return; // Non cliccabile se rossa
                    for (let i = 0; i < cost; i++) { untapped[i].classList.add('tapped'); }
                }
                playCard(cardData);
            } else {
                img.classList.toggle('tapped');
                updateCardHighlights(); // Ricalcola quando tappi manualmente
            }
        };
        return img;
    }

    function playCard(cardData) {
        const hIdx = hand.findIndex(c => c.scryfall_id === cardData.scryfall_id);
        if (hIdx > -1) hand.splice(hIdx, 1);
        
        const type = (cardData.type_line || "").toLowerCase();
        let zoneId = type.includes('land') ? 'field-lands' : (type.includes('creature') ? 'field-creatures' : 'field-others');
        document.getElementById(zoneId).appendChild(createCardUI(cardData, 'field'));
        updateUI();
    }

    function updateUI() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = '';
        hand.forEach(c => handDiv.appendChild(createCardUI(c, 'hand')));
        document.getElementById('count-lib').innerText = deck.length;
        updateCardHighlights();
    }

    function nextTurn() {
        document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped'));
        drawCard();
    }

    function untapAll() {
        document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped'));
        updateCardHighlights();
    }

    function drawCard() { if (deck.length > 0) { hand.push(deck.pop()); updateUI(); } }
    function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
    function changeLife(v) { life += v; document.getElementById('life-display').innerText = life; }

    window.onload = init;
</script>
</body>
</html>
