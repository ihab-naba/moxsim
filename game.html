<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoxSim Arena - Goldfish</title>
    <style>
        :root {
            --bg-black: #000000;
            --zone-bg: #0d0d0d;
            --mox-blue: #007bff;
            --btn-purple: #9a73ef;
            --btn-red: #d11326;
            --text-gray: #888;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        #arena-wrapper {
            display: grid;
            grid-template-columns: 1fr 280px;
            height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            gap: 10px;
        }

        /* --- CAMPO DA GIOCO (SINISTRA) --- */
        #play-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .main-zone {
            flex: 1;
            background-color: var(--zone-bg);
            border: 1px solid var(--mox-blue);
            border-radius: 12px;
            position: relative;
        }

        /* --- ZONA INFERIORE (MANO + MINI ZONE) --- */
        #bottom-row {
            display: flex;
            height: 220px;
            gap: 10px;
        }

        #hand-zone {
            flex: 2;
            background-color: var(--zone-bg);
            border: 1px solid var(--mox-blue);
            border-radius: 4px; /* Angoli più netti come in fdhgc.png */
            position: relative;
        }

        .mini-column {
            flex: 1.5;
            display: flex;
            gap: 10px;
        }

        .mini-zone {
            flex: 1;
            background-color: var(--zone-bg);
            border: 1px solid var(--mox-blue);
            border-radius: 4px;
            position: relative;
        }

        /* Label in alto a sinistra */
        .main-zone::before, #hand-zone::before, .mini-zone::before {
            content: attr(data-label);
            position: absolute;
            top: 8px;
            left: 10px;
            font-size: 10px;
            color: var(--text-gray);
            text-transform: uppercase;
            font-weight: bold;
        }

        /* --- SIDEBAR (DESTRA) --- */
        #sidebar {
            border: 1px solid var(--mox-blue);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            background-color: var(--bg-black);
        }

        .exit-link {
            text-align: right;
            font-size: 12px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .life-section {
            text-align: center;
            margin-top: 20px;
        }

        .life-label { font-size: 12px; color: #444; font-weight: bold; }
        .life-display { font-size: 60px; font-weight: 900; color: var(--mox-blue); margin: 5px 0; }

        .life-btns { display: flex; justify-content: center; gap: 15px; }
        .btn-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: #222;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* --- PULSANTI STILE PILLOLA (fdhgc.png) --- */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .pill-btn {
            background: linear-gradient(180deg, #b598f3 0%, #7d5bbe 100%);
            border: 1px solid #6a49ac;
            border-radius: 50px;
            color: white;
            padding: 8px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .pill-btn.red {
            background: linear-gradient(180deg, #e63946 0%, #a30b18 100%);
            border: 1px solid #820914;
        }

        /* Zona Commander in basso */
        #commander-box {
            margin-top: auto;
            height: 180px;
            border: 1px solid var(--mox-blue);
            border-radius: 4px;
            position: relative;
        }
        #commander-box::before {
            content: "COMMANDER";
            position: absolute;
            top: 8px;
            left: 10px;
            font-size: 10px;
            color: var(--text-gray);
        }

    </style>
</head>
<body>

<div id="arena-wrapper">
    <div id="play-area">
        <div class="main-zone" data-label="CREATURES"></div>
        <div class="main-zone" data-label="OTHERS"></div>
        <div class="main-zone" data-label="LAND"></div>
        
        <div id="bottom-row">
            <div id="hand-zone" data-label="LA TUA MANO"></div>
            <div class="mini-column">
                <div class="mini-zone" data-label="MAZZO"></div>
                <div class="mini-zone" data-label="CIMITERO"></div>
                <div class="mini-zone" data-label="ESILIO"></div>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <a href="index.html" class="exit-link">← ESCI DALL'ARENA</a>
        
        <div class="life-section">
            <div class="life-label">PLAYER LIFE</div>
            <div class="life-display">40</div>
            <div class="life-btns">
                <button class="btn-circle">-</button>
                <button class="btn-circle">+</button>
            </div>
        </div>

        <div class="controls">
            <button class="pill-btn">Player ▾</button>
            <button class="pill-btn">Sleeves ▾</button>
            <button class="pill-btn">Restart</button>
            <button class="pill-btn">Add Token ▾</button>
            <button class="pill-btn">Shuffle</button>
            <button class="pill-btn">View Library</button>
            <button class="pill-btn">Draw</button>
            <button class="pill-btn red">Next Turn</button>
        </div>

        <div id="commander-box"></div>
    </div>
</div>

</body>
</html>
