<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Turbo Edition</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #0b0b0b; --panel: #161616; --gray: #aaa; --sleeve-color: #1abc9c; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #arena { display: grid; grid-template-columns: 1fr 280px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 10px; }
        #board-header { display: flex; align-items: center; justify-content: space-between; padding: 0 5px; height: 35px; }
        .turn-badge { background: #1a1a1a; border: 1px solid #333; padding: 4px 15px; border-radius: 4px; font-weight: bold; color: var(--mox-blue); font-size: 13px; }
        .btn-home { background: #333; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 16px; }
        
        .zone { background: var(--panel); border: 1px solid #282828; border-radius: 8px; position: relative; display: flex; align-items: center; padding: 25px 10px 10px; gap: 12px; flex: 1; min-height: 0; overflow-x: auto; }
        .zone::before { content: attr(data-label); position: absolute; top: 6px; left: 12px; font-size: 10px; color: var(--gray); font-weight: bold; text-transform: uppercase; }
        
        #bottom-bar { display: flex; height: 170px; gap: 10px; flex-shrink: 0; }
        #hand { width: 100%; padding: 10px !important; justify-content: center; display: flex; flex: 2.5; }
        
        .pile-zone { flex: 0.6; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .pile-label { font-size: 11px; color: #eee; font-weight: bold; }
        .pile-visual { width: 85px; height: 118px; border-radius: 8px; border: 1px solid #333; background: #000; cursor: pointer; overflow: hidden; }
        .sleeve { background: var(--sleeve-color); border: 2px solid #fff; }
        
        .card { height: 130px; border-radius: 8px; cursor: grab; flex-shrink: 0; transition: transform 0.2s; position: relative; }
        .hand-card { margin-right: -50px; }
        .hand-card:hover { transform: translateY(-70px) scale(2.2); z-index: 1000 !important; margin: 0 40px; }
        .tapped { transform: rotate(90deg); margin: 0 35px; filter: brightness(0.7); }
        
        #sidebar { border-left: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #0c0c0c; }
        #life-box { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .life { font-size: 45px; font-weight: bold; }
        
        .btn { background: #2a2a2a; border: none; padding: 8px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .btn-blue { background: var(--mox-blue); }
        
        #token-overlay, #scry-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 7000; flex-direction: column; align-items: center; justify-content: center; }
        #error-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(209,19,38,0.9); padding: 10px 20px; border-radius: 5px; display: none; z-index: 9999; }
        .token { border: 2px dashed var(--mox-blue) !important; }
    </style>
</head>
<body>

<div id="arena">
    <div id="board">
        <div id="board-header">
            <div class="turn-badge" id="turn-display">Turno 1</div>
            <a href="index.html" class="btn-home">🏠</a>
        </div>
        <div class="zone" data-label="Creatures" id="field-creatures"></div>
        <div class="zone" data-label="Non-Creatures" id="field-others"></div>
        <div class="zone" data-label="Lands" id="field-lands"></div>
        <div id="bottom-bar">
            <div class="zone" data-label="Hand" id="hand"></div>
            <div class="pile-zone"><div class="pile-label">Lib (<span id="count-lib">0</span>)</div><div class="pile-visual sleeve" onclick="drawCard()"></div></div>
            <div class="pile-zone"><div class="pile-label">Grave (<span id="count-grave">0</span>)</div><div class="pile-visual" id="graveyard-visual"></div></div>
        </div>
    </div>
    <div id="sidebar">
        <div id="life-box">
            <div class="life" id="life-display">40</div>
            <div style="display:flex; gap:5px;"><button class="btn" style="flex:1" onclick="changeLife(-1)">-</button><button class="btn" style="flex:1" onclick="changeLife(1)">+</button></div>
        </div>
        <button class="btn btn-blue" onclick="nextTurn()">Next Turn</button>
        <button class="btn" style="background:#27ae60" onclick="toggleTokenMenu()">Tokens</button>
        <button class="btn" onclick="openScry()">Scry 1</button>
        <button class="btn" onclick="shuffleDeck()">Shuffle</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn" style="background:#a82331" onclick="location.reload()">Restart</button>
        <div id="commander-zone" style="height:120px; border:1px solid #333; border-radius:8px; display:flex; justify-content:center; align-items:center; background:#111;"></div>
    </div>
</div>

<div id="token-overlay">
    <div style="background:#1a1a1a; padding:25px; border-radius:15px; border:2px solid #27ae60; text-align:center;">
        <h2 style="color:#27ae60; margin-top:0;">Cerca Token</h2>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="token-search" placeholder="Es: Treasure, Zombie..." style="padding:8px; border-radius:4px; border:none; background:#000; color:white;">
            <button class="btn btn-blue" onclick="searchAndAddToken()">Crea</button>
        </div>
        <button class="btn" onclick="closeTokenMenu()">Chiudi</button>
    </div>
</div>

<div id="scry-overlay">
    <div id="scry-content"></div>
    <div style="display:flex; gap:15px; margin-top:20px">
        <button class="btn btn-blue" onclick="scryAction('top')">Metti Sopra</button>
        <button class="btn" onclick="scryAction('bottom')">Metti Sotto</button>
    </div>
</div>

<div id="error-msg"></div>

<script>
    let deck = [], hand = [], grave = [], life = 40, turn = 1;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let deckId = (urlParams.get('deck') || "").match(/\/decks\/([^?\/]+)/)?.[1] || (urlParams.get('deck') || "").split('/').pop();
        if (!deckId) return;

        showError("Caricamento veloce...");
        try {
            // Chiediamo a Moxfield solo la struttura (molto più veloce)
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://api.moxfield.com/v2/decks/all/${deckId}`)}`);
            const data = JSON.parse((await res.json()).contents);

            // Funzione per generare dati carta "leggeri" che puntano a Scryfall
            const simplify = (c) => ({
                name: c.name,
                type_line: c.type_line,
                scryfall_id: c.scryfall_id,
                image_uris: { normal: `https://api.scryfall.com/cards/${c.scryfall_id}?format=image&version=normal` }
            });

            if (data.commanders) {
                Object.values(data.commanders).forEach(c => {
                    document.getElementById('commander-zone').appendChild(createCardUI(simplify(c.card), 'commander'));
                });
            }

            if (data.mainboard) {
                Object.values(data.mainboard).forEach(info => {
                    for (let i = 0; i < info.quantity; i++) deck.push(simplify(info.card));
                });
            }

            shuffleDeck(false);
            for(let i=0; i<7; i++) if(deck.length > 0) hand.push(deck.pop());
            updateUI();
        } catch (err) { showError("Errore caricamento!"); }
    }

    function createCardUI(cardData, loc) {
        const img = document.createElement('img');
        img.src = cardData.image_uris.normal;
        img.className = 'card ' + (loc === 'hand' ? 'hand-card' : '');
        
        img.onclick = () => {
            const currentZone = img.parentElement.id;
            if (currentZone === 'hand' || currentZone === 'commander-zone') {
                playCard(cardData);
                img.remove();
            } else {
                img.classList.toggle('tapped');
            }
        };
        return img;
    }

    function playCard(cardData) {
        hand = hand.filter(c => c.name !== cardData.name || c.scryfall_id !== cardData.scryfall_id);
        const type = cardData.type_line.toLowerCase();
        let target = 'field-others';
        if (type.includes('land')) target = 'field-lands';
        else if (type.includes('creature')) target = 'field-creatures';
        
        document.getElementById(target).appendChild(createCardUI(cardData, 'field'));
        updateUI();
    }

    // --- TOKEN FIX ---
    async function searchAndAddToken() {
        const query = document.getElementById('token-search').value.trim();
        if (!query) return;
        try {
            const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(query)}`);
            const card = await res.json();
            if (card.status === 404) { showError("Manca!"); return; }

            const tokenData = {
                name: card.name,
                type_line: card.type_line,
                image_uris: { normal: card.image_uris.normal }
            };
            const ui = createCardUI(tokenData, 'field');
            ui.classList.add('token');
            const dest = tokenData.type_line.toLowerCase().includes('creature') ? 'field-creatures' : 'field-others';
            document.getElementById(dest).appendChild(ui);
            closeTokenMenu();
        } catch (e) { showError("Errore Scryfall"); }
    }

    // --- SCRY FIX ---
    function openScry() {
        if (deck.length === 0) return;
        const card = deck[deck.length - 1];
        document.getElementById('scry-overlay').style.display = 'flex';
        document.getElementById('scry-content').innerHTML = `<img src="${card.image_uris.normal}" style="height:450px; border-radius:15px;">`;
    }

    function scryAction(pos) {
        const card = deck.pop();
        if (pos === 'top') deck.push(card); else deck.unshift(card);
        document.getElementById('scry-overlay').style.display = 'none';
        updateUI();
    }

    function updateUI() {
        const h = document.getElementById('hand'); h.innerHTML = '';
        hand.forEach(c => h.appendChild(createCardUI(c, 'hand')));
        document.getElementById('count-lib').innerText = deck.length;
        document.getElementById('count-grave').innerText = grave.length;
    }

    function drawCard() { if (deck.length > 0) { hand.push(deck.pop()); updateUI(); } }
    function shuffleDeck(r=true) { deck.sort(() => Math.random() - 0.5); if(r) updateUI(); }
    function changeLife(v) { life += v; document.getElementById('life-display').innerText = life; }
    function nextTurn() { turn++; document.getElementById('turn-display').innerText = `Turno ${turn}`; document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped')); drawCard(); }
    function toggleTokenMenu() { document.getElementById('token-overlay').style.display = 'flex'; }
    function closeTokenMenu() { document.getElementById('token-overlay').style.display = 'none'; }
    function showError(m) { const e = document.getElementById('error-msg'); e.innerText = m; e.style.display = 'block'; setTimeout(() => e.style.display = 'none', 2000); }

    window.onload = init;
</script>
</body>
</html>
