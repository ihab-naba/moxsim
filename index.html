<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Tactical Update</title>
    <style>
        :root { --bg: #0b1014; --accent: #00a2ff; --cpu: #ff4757; --glow: rgba(0, 162, 255, 0.6); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* Layout Generale */
        #game-board { height: 100vh; width: 100%; display: flex; flex-direction: column; }
        .player-section { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* NUOVA ZONA: LA PILA (STACK) */
        #the-stack { 
            position: absolute; right: 200px; top: 50%; transform: translateY(-50%);
            width: 100px; height: 140px; border: 2px solid gold; border-radius: 8px;
            background: rgba(255, 215, 0, 0.05); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        #the-stack::before { content: 'STACK'; position: absolute; top: -20px; font-size: 10px; color: gold; font-weight: bold; }

        /* Battlefield */
        .battlefield-grid { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; padding: 10px; margin-bottom: 40px; }
        .card-row { display: flex; justify-content: center; align-items: center; width: 80%; min-height: 110px; gap: 5px; }

        /* Carte con Effetto GLOW */
        .card-wrapper { width: 80px; aspect-ratio: 2.5/3.5; position: relative; transition: all 0.2s; flex-shrink: 0; cursor: grab; }
        .playable { border-radius: 6px; box-shadow: 0 0 12px 3px var(--glow); transform: translateY(-5px); }
        .card-wrapper:hover { transform: scale(3.5); z-index: 9000 !important; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .card-img { width: 100%; height: 100%; border-radius: 6px; pointer-events: none; }

        /* Zone Laterali con Etichette Evidenti */
        .side-zones { position: absolute; display: flex; flex-direction: column; gap: 12px; top: 50%; transform: translateY(-50%); }
        .left { left: 15px; } .right { right: 15px; }
        .zone-slot { 
            width: 80px; height: 112px; border: 1px solid #333; 
            background: rgba(255,255,255,0.03); border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            position: relative; font-size: 9px; color: #444; font-weight: bold;
        }
        /* Etichette Scritte Bene */
        .zone-title { position: absolute; width: 100%; text-align: center; color: #888; letter-spacing: 1px; font-size: 9px; pointer-events: none; }

        /* MANO ABBASSATA PER SPAZIO TERRENO */
        #p-hand { 
            position: fixed; bottom: -20px; /* Abbassata per mostrare solo metà o uscire al hover */
            left: 50%; transform: translateX(-50%); 
            display: flex; justify-content: center; width: 60%; height: 140px; 
            transition: bottom 0.3s; z-index: 3000;
        }
        #p-hand:hover { bottom: 5px; } /* Sale quando serve */
        #p-hand .card-wrapper { margin-left: -35px; }

        /* HUD */
        #hud { position: fixed; right: 100px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; }
        .life-box { background: #1a1a1a; border: 1px solid #444; padding: 10px; border-radius: 8px; text-align: center; width: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-board">
    <div id="the-stack"></div>

    <div class="player-section" id="cpu-side">
        <div class="side-zones left">
            <div class="zone-slot"><span class="zone-title">EXILE</span></div>
            <div class="zone-slot"><span class="zone-title">GRAVEYARD</span></div>
        </div>
        <div class="battlefield-grid">
            <div class="card-row" id="c-row-lands"></div>
            <div class="card-row" id="c-row-creatures"></div>
        </div>
        <div class="side-zones right">
            <div class="zone-slot" id="c-lib"></div>
            <div class="zone-slot" id="c-cmd"></div>
        </div>
    </div>

    <div class="player-section" id="user-side">
        <div class="side-zones left">
            <div class="zone-slot" id="p-cmd"></div>
            <div class="zone-slot" id="p-lib" onclick="draw('p')"></div>
        </div>
        <div class="battlefield-grid">
            <div class="card-row" id="p-row-creatures"></div>
            <div class="card-row" id="p-row-lands"></div>
        </div>
        <div class="side-zones right">
            <div class="zone-slot"><span class="zone-title">GRAVEYARD</span></div>
            <div class="zone-slot"><span class="zone-title">EXILE</span></div>
        </div>
    </div>
</div>

<div id="p-hand"></div>

<div id="hud">
    <div class="life-box" style="color:var(--cpu)">40</div>
    <div class="life-box" style="color:var(--accent)">40</div>
    <button onclick="runAI()" style="cursor:pointer; background:var(--cpu); border:none; border-radius:4px; color:white; padding:5px;">AI MOVE</button>
</div>

<script>
    let decks = { p: [], c: [] };

    // ESEMPIO LOGICA AI MIGLIORATA
    function runAI() {
        if (decks.c.length === 0) return;
        
        const cardName = decks.c.pop();
        // Simula scelta logica: se contiene "Land" va nella riga land, altrimenti creatures
        const isLand = cardName.toLowerCase().includes("land") || cardName.toLowerCase().includes("island") || cardName.toLowerCase().includes("forest");
        const targetRow = isLand ? 'c-row-lands' : 'c-row-creatures';
        
        // Passa prima dallo STACK
        const card = spawn(cardName, 'the-stack');
        setTimeout(() => {
            document.getElementById(targetRow).appendChild(card);
        }, 1000);
    }

    function spawn(name, zoneId) {
        const card = document.createElement('div');
        card.className = 'card-wrapper playable'; // Aggiunto glow di default per test
        card.innerHTML = `<img src="https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image" class="card-img">`;
        
        card.draggable = true;
        card.ondragstart = (e) => { 
            card.classList.add('dragging');
            card.classList.remove('playable'); // Rimuove glow mentre sposti
        };
        card.ondragend = () => card.classList.remove('dragging');

        document.getElementById(zoneId).appendChild(card);
        return card;
    }

    // Drag & Drop con magnetismo
    document.querySelectorAll('.card-row, .zone-slot, #the-stack').forEach(zone => {
        zone.ondragover = (e) => e.preventDefault();
        zone.ondrop = (e) => {
            const dragged = document.querySelector('.dragging');
            if (dragged) zone.appendChild(dragged);
        };
    });

    // Inizializzazione rapida per test (qui andrebbe la tua fetch moxfield)
    decks.c = ["Sol Ring", "Command Tower", "Arcane Signet", "Forest", "Llanowar Elves"];
</script>
</body>
</html>
