<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Wix Style Editor</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #007bff; --brd: #222; --card-w: 80px; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }

        /* HEADER */
        #top { height: 45px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--brd); gap: 10px; }
        input { background: #111; border: 1px solid #333; color: white; padding: 6px; border-radius: 4px; flex: 1; }
        .btn { background: var(--accent); border: none; color: white; padding: 7px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* LAYOUT PRINCIPALE */
        #container { display: flex; height: calc(100vh - 45px); width: 100vw; }
        
        /* AREA GIOCO */
        #field { flex-grow: 1; display: flex; flex-direction: column; border-right: 1px solid var(--brd); }
        .player-side { flex: 1; display: grid; grid-template-columns: 300px 5px 1fr; grid-template-rows: 1fr 5px 150px; background: #111; gap: 0; }
        
        /* ZONE */
        .zone { background: var(--bg); position: relative; overflow: auto; padding: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
        .zone::after { content: attr(data-label); position: absolute; top: 5px; left: 10px; font-size: 10px; color: #444; pointer-events: none; }
        
        /* RESIZERS (Le barre trascinabili stile Wix) */
        .resizer-v { background: #1a1a1a; cursor: col-resize; transition: 0.2s; }
        .resizer-h { background: #1a1a1a; cursor: row-resize; transition: 0.2s; }
        .resizer-v:hover, .resizer-h:hover { background: var(--accent); }

        /* SIDEBAR COMPATTA (Basata su ugviy.png) */
        #sidebar { width: 260px; background: #0d0d0d; display: flex; flex-direction: column; padding: 10px; gap: 10px; }
        .stat-box { background: #000; border: 1px solid var(--brd); padding: 15px; text-align: center; border-radius: 8px; }
        .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .slot { height: 110px; background: #050505; border: 1px solid #222; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; }

        /* CARDS */
        .card { width: var(--card-w); aspect-ratio: 2.5/3.5; border-radius: 5px; cursor: grab; background: #222; }
        .card img { width: 100%; height: 100%; border-radius: 5px; }
        .card:hover { transform: scale(3); z-index: 100; }
    </style>
</head>
<body>

<div id="top">
    <b style="color:var(--accent)">MOXSIM EDIT</b>
    <input type="text" id="p1" placeholder="Moxfield URL">
    <button class="btn" onclick="load()">CARICA</button>
</div>

<div id="container">
    <div id="field">
        <div class="player-side" style="transform: rotate(180deg)">
             <div class="zone" data-label="OTHERS"></div><div class="resizer-v"></div><div class="zone" data-label="CREATURES"></div>
             <div class="resizer-h" style="grid-column: span 3"></div>
             <div class="zone" data-label="HAND"></div><div class="resizer-v"></div><div class="zone" data-label="LANDS"></div>
        </div>

        <div class="player-side" id="p-layout">
            <div class="zone" data-label="Artefacts/Enchants" id="p-others"></div>
            <div class="resizer-v" id="v-drag"></div>
            <div class="zone" data-label="Creatures" id="p-creats"></div>
            
            <div class="resizer-h" id="h-drag" style="grid-column: span 3"></div>
            
            <div class="zone" data-label="Hand" id="p-hand"></div>
            <div class="resizer-v" id="v-drag-2"></div>
            <div class="zone" data-label="Lands" id="p-lands"></div>
        </div>
    </div>

    <div id="sidebar">
        <div class="stat-box">
            <div style="color:#ff4757">CPU: 40</div>
            <button class="btn" style="background:#ff4757; width:100%; margin-top:10px">AI MOVE</button>
        </div>
        <div class="mini-grid">
            <div class="slot">GRAVE</div><div class="slot">EXILE</div>
        </div>
        <div style="flex-grow:1"></div>
        <div class="mini-grid">
            <div class="slot">EXILE</div><div class="slot">GRAVE</div>
        </div>
        <div class="stat-box">
            <div style="color:var(--accent)">YOU: 40</div>
            <button class="btn" style="width:100%; margin-top:10px">DRAW CARD</button>
        </div>
        <div class="mini-grid">
            <div class="slot">CMD</div><div class="slot">LIB</div>
        </div>
    </div>
</div>

<script>
    // LOGICA RESIZER (WIX STYLE)
    const layout = document.getElementById('p-layout');
    const hDrag = document.getElementById('h-drag');
    const vDrag = document.getElementById('v-drag');

    // Ridimensionamento Orizzontale (Altezza Mano/Terre)
    hDrag.onmousedown = (e) => {
        document.onmousemove = (ev) => {
            let delta = window.innerHeight - ev.clientY;
            layout.style.gridTemplateRows = `1fr 5px ${delta - 45}px`;
        };
        document.onmouseup = () => document.onmousemove = null;
    };

    // Ridimensionamento Verticale (Larghezza Mano vs Terre)
    vDrag.onmousedown = (e) => {
        document.onmousemove = (ev) => {
            layout.style.gridTemplateColumns = `${ev.clientX}px 5px 1fr`;
        };
        document.onmouseup = () => document.onmousemove = null;
    };

    function load() {
        alert("Inserisci URL e trascina le barre blu per regolare il tuo tavolo!");
    }
</script>
</body>
</html>
