<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoxSim - Deck Selection</title>
    <style>
        :root {
            --mox-blue: #007bff;
            --mox-hover: #0056b3;
            --bg: #0f0f0f;
            --panel: #1a1a1a;
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--mox-blue), #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p { color: #888; margin-bottom: 30px; }

        .input-group {
            background: var(--panel);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: #000;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--mox-blue);
        }

        .btn-launch {
            width: 100%;
            padding: 12px;
            background: var(--mox-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-launch:hover {
            background: var(--mox-hover);
            transform: translateY(-2px);
        }

        .recent-decks {
            margin-top: 40px;
            text-align: left;
        }

        .recent-decks h3 {
            font-size: 14px;
            text-transform: uppercase;
            color: #555;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .deck-card {
            background: var(--panel);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .deck-card:hover {
            border-color: var(--mox-blue);
            background: #222;
        }

        .deck-info { display: flex; flex-direction: column; }
        .deck-name { font-weight: bold; font-size: 14px; color: #fff; }
        .deck-id { font-size: 11px; color: #666; }

        .empty-state {
            color: #444;
            font-style: italic;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MoxSim</h1>
    <p>Il simulatore leggero per i tuoi mazzi Moxfield</p>

    <div class="input-group">
        <input type="text" id="deckUrl" placeholder="Incolla link Moxfield (es. moxfield.com/decks/...)">
        <button class="btn-launch" onclick="launchSimulator()">Lancia Simulatore</button>
    </div>

    <div class="recent-decks">
        <h3>Mazzi Recenti</h3>
        <div id="recentList">
            <div class="empty-state">Nessun mazzo caricato di recente.</div>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'moxsim_recent_decks';

    // Carica i mazzi salvati all'avvio
    window.onload = function() {
        displayRecentDecks();
    };

    function launchSimulator() {
        const urlInput = document.getElementById('deckUrl').value.trim();
        if (!urlInput) return alert("Inserisci un link valido!");

        // Estrai l'ID del mazzo dal link
        const deckId = urlInput.match(/\/decks\/([^?\/]+)/)?.[1] || urlInput.split('/').pop();
        
        if (deckId) {
            saveToRecent(deckId);
            window.location.href = `game.html?deck=${deckId}`;
        } else {
            alert("ID mazzo non riconosciuto.");
        }
    }

    function saveToRecent(id) {
        let recent = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        // Evita duplicati: se esiste già, lo sposta in cima
        recent = recent.filter(item => item !== id);
        recent.unshift(id);
        // Tieni solo gli ultimi 5
        recent = recent.slice(0, 5);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(recent));
    }

    function displayRecentDecks() {
        const recent = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const list = document.getElementById('recentList');
        
        if (recent.length > 0) {
            list.innerHTML = '';
            recent.forEach(id => {
                const card = document.createElement('div');
                card.className = 'deck-card';
                card.onclick = () => window.location.href = `game.html?deck=${id}`;
                card.innerHTML = `
                    <div class="deck-info">
                        <span class="deck-name">Deck: ${id}</span>
                        <span class="deck-id">ID: ${id}</span>
                    </div>
                    <span style="color:var(--mox-blue)">→</span>
                `;
                list.appendChild(card);
            });
        }
    }
</script>

</body>
</html>
