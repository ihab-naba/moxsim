<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoxSim Arena - Pro Mode</title>
    <style>
        :root { --bg: #0b0d10; --field: #16191d; --accent: #00a2ff; --glow: rgba(0, 162, 255, 0.4); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        #vfx-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1b1e23 0%, #0b0d10 100%); z-index: -1; }
        #top-bar { height: 50px; background: rgba(0,0,0,0.85); display: flex; align-items: center; padding: 0 20px; gap: 10px; border-bottom: 1px solid #333; backdrop-filter: blur(10px); z-index: 100; position: relative; }
        input { background: #222; border: 1px solid #444; color: white; padding: 8px; flex-grow: 1; border-radius: 4px; outline: none; }
        
        #game-world { height: 100vh; width: 100%; position: relative; display: flex; }
        #main-field { flex-grow: 1; position: relative; overflow: hidden; }
        
        /* Sidebar Cimitero */
        #graveyard { width: 150px; background: rgba(0,0,0,0.4); border-left: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 10px; gap: 10px; overflow-y: auto; }
        .gy-card { width: 100px; opacity: 0.6; grayscale(50%); margin-bottom: -80px; transition: 0.3s; }
        .gy-card:hover { opacity: 1; margin-bottom: 5px; }

        /* Carte */
        .card-wrapper { position: absolute; width: 110px; cursor: grab; z-index: 10; transition: transform 0.2s; }
        .card-img { width: 100%; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.8); }
        .tapped { transform: rotate(90deg) !important; }

        /* Mano */
        #hand { position: fixed; bottom: -10px; width: calc(100% - 150px); height: 160px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; z-index: 1000; pointer-events: none; }
        #hand .card-wrapper { position: relative; margin-left: -40px; pointer-events: auto; }
        #hand .card-wrapper:hover { transform: translateY(-50px) scale(1.5); z-index: 2000; }

        /* HUD */
        #side-menu { position: absolute; right: 170px; top: 70px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .stat-box { background: rgba(20,20,20,0.9); padding: 10px; border-radius: 10px; border: 1px solid #444; text-align: center; min-width: 100px; }
        .btn-action { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 5px; }
        .btn-action:hover { background: var(--accent); }
        .btn-mulligan { background: #ff4757; font-size: 10px; }
    </style>
</head>
<body>

<div id="vfx-bg"></div>
<div id="top-bar">
    <b style="color:var(--accent)">MOXSIM ARENA</b>
    <input type="text" id="deckUrl" placeholder="URL Moxfield...">
    <button class="btn-action" style="width:auto; background:var(--accent)" onclick="importDeck()">CARICA</button>
</div>

<div id="game-world">
    <div id="main-field" ondragover="event.preventDefault()" ondrop="dropToField(event)">
        <div id="side-menu">
            <div class="stat-box">
                <div style="font-size:10px">LIFE</div>
                <div id="hp-val" style="font-size:24px; color:#ff4757; font-weight:bold">40</div>
                <button class="btn-action" onclick="updateHP(1)">+</button>
                <button class="btn-action" onclick="updateHP(-1)">-</button>
            </div>
            <div class="stat-box">
                <div id="deck-count" style="font-size:18px">0</div>
                <button class="btn-action" onclick="drawCard()">PESCA</button>
                <button class="btn-action btn-mulligan" onclick="mulligan()">MULLIGAN</button>
            </div>
        </div>
        <div id="player-field" style="width:100%; height:100%"></div>
    </div>
    
    <div id="graveyard">
        <div style="font-size:10px; color:#aaa">GRAVEYARD</div>
    </div>
</div>

<div id="hand"></div>

<audio id="snd-draw" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
<audio id="snd-tap" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
    let deck = [];
    let initialDeck = [];
    let life = 40;

    function playSnd(id) { document.getElementById(id).currentTime = 0; document.getElementById(id).play().catch(()=>{}); }
    function updateHP(v) { life += v; document.getElementById('hp-val').innerText = life; }

    async function importDeck() {
        const url = document.getElementById('deckUrl').value;
        const id = url.split('/decks/')[1]?.split('?')[0];
        const proxy = "https://corsproxy.io/?";
        const target = `https://api.moxfield.com/v2/decks/all/${id}`;

        try {
            const resp = await fetch(proxy + encodeURIComponent(target));
            const data = await resp.json();
            initialDeck = [];
            Object.values(data.mainboard).forEach(c => {
                for(let i=0; i<c.quantity; i++) initialDeck.push({name: c.card.name});
            });
            resetGame();
            alert("Mazzo caricato!");
        } catch(e) { alert("Errore caricamento."); }
    }

    function resetGame() {
        deck = [...initialDeck].sort(() => Math.random() - 0.5);
        document.getElementById('deck-count').innerText = deck.length;
        document.getElementById('hand').innerHTML = '';
        document.getElementById('player-field').innerHTML = '';
        document.getElementById('graveyard').innerHTML = '<div style="font-size:10px; color:#aaa">GRAVEYARD</div>';
    }

    function mulligan()
    function nextTurn() {
        // 1. Stappa tutto (Untap)
        const cards = document.querySelectorAll('.card-wrapper');
        cards.forEach(c => c.classList.remove('tapped'));
        
        // 2. Pesca automaticamente (Draw)
        drawCard();
        
        // 3. Feedback visivo
        const field = document.getElementById('player-field');
        field.style.boxShadow = "inset 0 0 50px var(--accent)";
        setTimeout(() => field.style.boxShadow = "none", 500);
    }
    { if(confirm("Rimescolare tutto nel mazzo?")) resetGame(); }

    function drawCard() {
        if(deck.length === 0) return;
        playSnd('snd-draw');
        const card = deck.pop();
        document.getElementById('deck-count').innerText = deck.length;
        addCardToUI(card.name, true);
    }

    function addCardToUI(name, toHand) {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        const img = document.createElement('img');
        img.src = `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image&version=normal`;
        img.className = 'card-img';
        wrapper.appendChild(img);

        wrapper.ondblclick = () => { if(wrapper.parentElement.id !== 'hand') { playSnd('snd-tap'); wrapper.classList.toggle('tapped'); } };
        
        // Tasto destro per mandare al cimitero
        wrapper.oncontextmenu = (e) => {
            e.preventDefault();
            const gy = document.getElementById('graveyard');
            wrapper.className = 'gy-card';
            wrapper.style.position = 'relative';
            wrapper.style.left = '0'; wrapper.style.top = '0';
            gy.appendChild(wrapper);
        };

        wrapper.onmousedown = function(e) {
            if(e.button !== 0) return;
            let shiftX = e.clientX - wrapper.getBoundingClientRect().left;
            let shiftY = e.clientY - wrapper.getBoundingClientRect().top;
            function moveAt(px, py) { wrapper.style.left = px - shiftX + 'px'; wrapper.style.top = py - shiftY + 'px'; }
            function onMouseMove(e) {
                if(wrapper.parentElement.id === 'hand') { document.getElementById('player-field').appendChild(wrapper); wrapper.style.position = 'absolute'; }
                moveAt(e.clientX, e.clientY);
            }
            document.addEventListener('mousemove', onMouseMove);
            document.onmouseup = () => document.removeEventListener('mousemove', onMouseMove);
        };

        if(toHand) document.getElementById('hand').appendChild(wrapper);
        else document.getElementById('player-field').appendChild(wrapper);
    }
</script>
</body>
</html>
