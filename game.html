<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoxSim Arena - Battle Table</title>
    
    <style>
        :root {
            --player-aura: #007bff;
            --mox-purple: #7d5bbe;
            --bg-dark: #000000; /* Nero assoluto come da screenshot */
            --zone-bg: #0a0a0a;
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg-dark); color: white; 
            height: 100vh; overflow: hidden; 
        }

        #arena {
            display: grid;
            grid-template-columns: 1fr 300px;
            height: 100vh;
        }

        /* --- CAMPO DA GIOCO --- */
        #main-battlefield {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
        }

        /* Zone superiori impilate */
        .zone-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .zone {
            flex: 1;
            background: var(--zone-bg);
            border: 1px solid var(--player-aura); /* Bordo blu sottile su tutto il perimetro */
            border-radius: 12px;
            position: relative;
        }

        /* Etichette zone (Alto a sinistra) */
        .zone::before, .sub-zone::before {
            content: attr(data-label);
            position: absolute;
            top: 10px;
            left: 12px;
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- ZONA INFERIORE (Mano + Mazzo/Cimitero/Esilio) --- */
        #bottom-bar {
            display: flex;
            height: 180px;
            gap: 8px;
        }

        #hand-zone {
            flex: 2.5;
            background: var(--zone-bg);
            border: 1px solid var(--player-aura);
            border-radius: 12px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #right-stack {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        .sub-zone {
            flex: 1;
            background: var(--zone-bg);
            border: 1px solid var(--player-aura);
            border-radius: 12px;
            position: relative;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background: #0a0a0a;
            border-left: 1px solid #222;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .life-box {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        .life-total { font-size: 50px; font-weight: 900; color: var(--player-aura); display: block; }

        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-circle { 
            background: #222; border: none; color: white; width: 40px; height: 40px; 
            border-radius: 50%; cursor: pointer; font-size: 20px;
        }

        .btn-action {
            background: var(--mox-purple);
            color: white; border: none; padding: 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase;
        }

        #preview-area {
            margin-top: auto;
            height: 200px;
            border: 1px dashed #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="arena">
    <div id="main-battlefield">
        <div class="zone-stack">
            <div class="zone" data-label="CREATURES"></div>
            <div class="zone" data-label="OTHERS"></div>
            <div class="zone" data-label="LAND"></div>
        </div>

        <div id="bottom-bar">
            <div id="hand-zone" data-label="LA TUA MANO"></div>
            <div id="right-stack">
                <div class="sub-zone" data-label="MAZZO"></div>
                <div class="sub-zone" data-label="CIMITERO"></div>
                <div class="sub-zone" data-label="ESILIO"></div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div style="color: #444; font-size: 11px; text-align: right; cursor: pointer;" onclick="window.location.href='index.html'">← ESCI DALL'ARENA</div>
        
        <div class="life-box">
            <small style="color:#555">PLAYER LIFE</small>
            <span class="life-total">40</span>
            <div class="btn-group">
                <button class="btn-circle">-</button>
                <button class="btn-circle">+</button>
            </div>
        </div>

        <button class="btn-action">PESCA CARTA</button>
        <button class="btn-action" style="background: #333;">RIAVVIA MATCH</button>

        <div id="preview-area">Card Preview</div>
    </div>
</div>

</body>
</html>
