<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoxSim Arena - Battle Table</title>
    
    <style>
        :root {
            --player-aura: #007bff;
            --ai-aura: #ff4757;
            --mox-purple: #7d5bbe;
            --bg-dark: #0a0a0a;
            --zone-bg: rgba(255, 255, 255, 0.02);
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* LAYOUT PRINCIPALE */
        #arena {
            display: grid;
            grid-template-columns: 1fr 280px;
            height: 100vh;
        }

        /* TAVOLO DA GIOCO */
        #table {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            position: relative;
        }

        .side { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        .zone-row { display: flex; gap: 10px; flex: 1; }

        .zone {
            flex: 1;
            background: var(--zone-bg);
            border: 1px solid #222;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: 0.3s;
        }

        /* EFFETTI NEON */
        .player-side .zone { border-bottom: 2px solid var(--player-aura); }
        .ai-side .zone { border-top: 2px solid var(--ai-aura); }
        
        .zone::after {
            content: attr(data-label);
            position: absolute;
            font-size: 10px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* MANO DEL GIOCATORE */
        #hand {
            height: 120px;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px;
        }

        /* SIDEBAR CONTROLLI */
        .sidebar {
            background: #111;
            border-left: 1px solid #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .life-box {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #222;
        }

        .life-total { font-size: 54px; font-weight: 900; color: var(--player-aura); display: block; }

        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-sm { 
            background: #222; border: none; color: white; width: 40px; height: 40px; 
            border-radius: 50%; cursor: pointer; font-size: 20px; 
        }
        .btn-sm:hover { background: #333; }

        .btn-action {
            background: var(--mox-purple);
            color: white; border: none; padding: 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase;
        }

        /* CARTE */
        .card-mini {
            width: 70px; height: 100px;
            background: #222; border-radius: 5px;
            border: 1px solid #444;
            cursor: pointer;
        }

        /* MODALITÀ GOLDFISH */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="arena">
    <div id="table">
        <div class="side ai-side" id="ai-area">
            <div class="zone-row">
                <div class="zone" data-label="AI Creatures"></div>
                <div class="zone" data-label="AI Lands"></div>
            </div>
        </div>

        <div class="side player-side">
            <div class="zone-row">
                <div class="zone" data-label="Your Lands"></div>
                <div class="zone" data-label="Your Creatures"></div>
                <div class="zone" data-label="Other Permanents"></div>
            </div>
        </div>

        <div id="hand">
            <p style="color:#444; font-size: 12px;">LA TUA MANO APPARIRÀ QUI</p>
        </div>
    </div>

    <div class="sidebar">
        <button onclick="window.location.href='index.html'" style="background:none; border:none; color:#555; cursor:pointer; text-align:left;">← Torna alla Libreria</button>
        
        <div class="life-box">
            <span style="font-size: 12px; color: #444;">PLAYER LIFE</span>
            <span id="player-life" class="life-total">40</span>
            <div class="btn-group">
                <button class="btn-sm" onclick="changeLife(-1)">-</button>
                <button class="btn-sm" onclick="changeLife(1)">+</button>
            </div>
        </div>

        <div id="ai-life-box" class="life-box" style="border-color: var(--ai-aura);">
            <span style="font-size: 12px; color: #444;">AI LIFE</span>
            <span id="ai-life" class="life-total" style="color: var(--ai-aura);">40</span>
        </div>

        <button class="btn-action" onclick="drawCard()">PESCA CARTA</button>
        <button class="btn-action" style="background:#444" onclick="shuffleDeck()">MESCOLA</button>
        
        <div style="margin-top: auto;">
            <p id="game-info" style="font-size: 10px; color: #444; text-transform: uppercase;"></p>
        </div>
    </div>
</div>

<script>
    // 1. GESTIONE MODALITÀ E URL
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || 'ai';
    const deckUrl = params.get('deck');

    document.getElementById('game-info').innerText = `MODALITÀ: ${mode}`;

    if (mode === 'goldfish') {
        document.getElementById('ai-area').classList.add('hidden');
        document.getElementById('ai-life-box').classList.add('hidden');
    }

    // 2. LOGICA DI GIOCO BASE
    let life = 40;
    function changeLife(amt) {
        life += amt;
        document.getElementById('player-life').innerText = life;
    }

    function drawCard() {
        console.log("Pesca una carta...");
        // Qui integreremo la chiamata API a Scryfall/Moxfield
    }

    // 3. CARICAMENTO MAZZO (LOGICA PROXY)
    async function loadMoxfieldDeck(url) {
        console.log("Iniziando caricamento mazzo:", url);
        // Per evitare l'errore CORS, useremo in futuro un fetcher specifico
        // Per ora simuliamo il successo
        setTimeout(() => {
            console.log("Mazzo pronto nell'Arena!");
        }, 1000);
    }

    if (deckUrl) loadMoxfieldDeck(deckUrl);
</script>

</body>
</html>
