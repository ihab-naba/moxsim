<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Goldfish V10</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #000; --panel: #0d0d0d; --gray: #888; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #arena { display: grid; grid-template-columns: 1fr 300px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 8px; }
        
        .zone { 
            background: var(--panel); border: 1px solid var(--mox-blue); border-radius: 12px; 
            position: relative; display: flex; align-items: center; padding: 25px 10px 5px; gap: 15px; flex: 1;
            min-height: 0; overflow-x: auto;
        }
        .zone::before { content: attr(data-label); position: absolute; top: 5px; left: 10px; font-size: 10px; color: var(--gray); font-weight: bold; }

        #bottom-bar { display: flex; height: 180px; gap: 8px; flex-shrink: 0; }
        #hand { flex: 2.5; justify-content: center; overflow: hidden; }
        #hand .card { height: 155px; width: auto; margin-right: -45px; transition: 0.2s; z-index: 1; }
        #hand .card:hover { transform: translateY(-30px) scale(1.3); z-index: 100; margin-right: 10px; margin-left: 10px; }

        .small-zone { flex: 0.6; justify-content: center; overflow: hidden; }
        
        /* CARTE SUL CAMPO */
        .card { height: 130px; border-radius: 8px; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.7); transition: 0.2s; }
        .zone .card:hover { filter: brightness(1.2); outline: 2px solid var(--mox-blue); }
        .tapped { transform: rotate(90deg); margin: 0 20px; filter: brightness(0.6) !important; }

        /* FIX MAZZO */
        .library-back { height: 130px; border-radius: 8px; border: 1px solid #333; }
        .count-badge { position: absolute; bottom: 10px; right: 10px; background: #000; color: var(--mox-blue); padding: 2px 8px; border: 1px solid var(--mox-blue); border-radius: 4px; font-weight: bold; font-size: 14px; }

        #sidebar { border: 1px solid var(--mox-blue); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .life { font-size: 65px; text-align: center; color: var(--mox-blue); font-weight: bold; margin: 0; text-shadow: 0 0 15px rgba(0,123,255,0.5); }
        
        .btn { background: #9a73ef; border: none; padding: 10px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; box-shadow: 0 4px #6a49ac; }
        .btn:active { box-shadow: 0 2px #6a49ac; transform: translateY(2px); }
        .btn-red { background: #d11326; box-shadow: 0 4px #820914; }
        
        #commander-zone { margin-top: auto; height: 180px; border: 1px solid var(--mox-blue); border-radius: 12px; display: flex; justify-content: center; align-items: center; position: relative; }
        #commander-zone .card { height: 160px; }
    </style>
</head>
<body>

<div id="arena">
    <div id="board">
        <div class="zone" data-label="CREATURES" id="field-creatures"></div>
        <div class="zone" data-label="OTHERS" id="field-others"></div>
        <div class="zone" data-label="LANDS" id="field-lands"></div>
        <div id="bottom-bar">
            <div class="zone" data-label="LA TUA MANO" id="hand"></div>
            <div class="zone small-zone" data-label="MAZZO" id="library"></div>
            <div class="zone small-zone" data-label="CIMITERO" id="graveyard"></div>
            <div class="zone small-zone" data-label="ESILIO" id="exile"></div>
        </div>
    </div>

    <div id="sidebar">
        <div style="text-align:right; font-size: 11px; cursor: pointer; color: var(--gray);" onclick="window.location.href='index.html'">← ESCI</div>
        <div class="life" id="life-display">40</div>
        <div style="display:flex; gap:10px; justify-content:center; margin-bottom: 5px;">
            <button class="btn" style="width:45px" onclick="changeLife(-1)">-</button>
            <button class="btn" style="width:45px" onclick="changeLife(1)">+</button>
        </div>
        <button class="btn" onclick="untapAll()">Untap All</button>
        <button class="btn" onclick="shuffleDeck()">Shuffle</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn-red btn" onclick="location.reload()">Restart</button>
        <div id="commander-zone" data-label="COMMANDER"></div>
    </div>
</div>

<script>
    let deck = [];
    let hand = [];
    let life = 40;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let deckUrl = urlParams.get('deck');
        if (!deckUrl) return;
        const deckId = deckUrl.match(/\/decks\/([^?\/]+)/)?.[1] || deckUrl.split('/').pop();
        
        try {
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent(`https://api.moxfield.com/v2/decks/all/${deckId}`);
            const response = await fetch(proxy + target);
            const json = await response.json();
            const data = JSON.parse(json.contents);

            if (data.commanders) {
                const cz = document.getElementById('commander-zone');
                Object.values(data.commanders).forEach(c => cz.appendChild(createCardUI(c.card, 'field')));
            }

            deck = [];
            Object.values(data.mainboard).forEach(info => {
                for (let i = 0; i < info.quantity; i++) { deck.push(info.card); }
            });

            shuffleArray(deck);
            for(let i=0; i<7; i++) { if(deck.length > 0) hand.push(deck.pop()); }
            updateUI();
        } catch (err) { console.error("Errore caricamento"); }
    }

    function createCardUI(cardData, location = 'hand') {
        const img = document.createElement('img');
        img.src = `https://api.scryfall.com/cards/${cardData.scryfall_id}?format=image&version=normal`;
        img.className = 'card';
        
        img.onclick = () => {
            if (location === 'hand') playCard(cardData);
            else img.classList.toggle('tapped');
        };
        return img;
    }

    function playCard(cardData) {
        const idx = hand.findIndex(c => c.scryfall_id === cardData.scryfall_id);
        if (idx > -1) {
            hand.splice(idx, 1);
            const type = (cardData.type_line || "").toLowerCase();
            let zoneId = type.includes('land') ? 'field-lands' : (type.includes('creature') ? 'field-creatures' : 'field-others');
            document.getElementById(zoneId).appendChild(createCardUI(cardData, 'field'));
            updateUI();
        }
    }

    function untapAll() {
        document.querySelectorAll('.card.tapped').forEach(card => card.classList.remove('tapped'));
    }

    function shuffleDeck() {
        shuffleArray(deck);
        alert("Mazzo Mescolato!");
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function drawCard() {
        if (deck.length > 0) {
            hand.push(deck.pop());
            updateUI();
        }
    }

    function updateUI() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = '';
        hand.forEach(c => handDiv.appendChild(createCardUI(c, 'hand')));

        const libDiv = document.getElementById('library');
        // USIAMO UN'IMMAGINE STATICA PER IL RETRO
        libDiv.innerHTML = deck.length > 0 ? 
            `<img src="https://cards.scryfall.io/large/back.jpg" class="library-back">
             <div class="count-badge">${deck.length}</div>` : '';
    }

    function changeLife(v) {
        life += v;
        document.getElementById('life-display').innerText = life;
    }

    window.onload = init;
</script>
</body>
</html>
