<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - V29 Mana Tracker Edition</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #0b0b0b; --panel: #161616; --gray: #aaa; --sleeve-color: #1abc9c; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #arena { display: grid; grid-template-columns: 1fr 280px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 10px; }
        #board-header { display: flex; align-items: center; padding: 0 5px; height: 35px; gap: 15px; }
        .turn-badge { background: #1a1a1a; border: 1px solid #333; padding: 4px 15px; border-radius: 4px; font-weight: bold; color: var(--mox-blue); font-size: 13px; }
        
        .zone { background: var(--panel); border: 1px solid #282828; border-radius: 8px; position: relative; display: flex; align-items: center; padding: 25px 10px 10px; gap: 12px; flex: 1; min-height: 0; overflow-x: auto; }
        .zone.drag-over { border-color: var(--mox-blue); background: #222; }
        .zone::before { content: attr(data-label); position: absolute; top: 6px; left: 12px; font-size: 10px; color: var(--gray); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        
        #bottom-bar { display: flex; height: 170px; gap: 10px; flex-shrink: 0; }
        #hand-container { flex: 2.5; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        #hand { width: 100%; padding: 10px !important; justify-content: center; overflow: visible !important; }
        .pile-label { font-size: 11px; color: #eee; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .pile-zone { flex: 0.6; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .pile-visual { width: 85px; height: 118px; border-radius: 8px; border: 1px solid #333; background: #000; position: relative; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .sleeve { background: var(--sleeve-color); border: 2px solid #fff; }
        
        .card { height: 130px; border-radius: 8px; cursor: grab; flex-shrink: 0; transition: transform 0.2s; user-select: none; position: relative; }
        .card:active { cursor: grabbing; z-index: 5000; }
        .hand-card { margin-right: -50px; }
        .hand-card:hover { transform: translateY(-70px) scale(2.2); z-index: 1000 !important; margin: 0 40px; }
        .tapped { transform: rotate(90deg); margin: 0 35px; filter: brightness(0.6); }
        
        #sidebar { border-left: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #0c0c0c; overflow-y: auto; }
        #life-box { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; align-items: center; }
        .life { font-size: 45px; font-weight: bold; line-height: 1; margin: 5px 0; }
        
        #mana-tracker { background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 5px; }
        .mana-stat { text-align: center; }
        .mana-val { font-size: 18px; font-weight: bold; color: #fff; }
        .mana-lbl { font-size: 9px; color: #666; text-transform: uppercase; }

        .btn { background: #2a2a2a; border: none; padding: 8px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 11px; text-transform: uppercase; }
        .btn-blue { background: var(--mox-blue); }
        .btn-mulligan { background: #e67e22; }

        #commander-zone { height: 120px; border: 1px solid #282828; border-radius: 8px; display: flex; justify-content: center; align-items: center; margin-top: auto; background: #111; position: relative; padding: 5px; }
        #commander-zone::before { content: "COMMANDER"; position: absolute; top: 5px; font-size: 9px; color: #555; }

        #error-msg { position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%); background: rgba(209, 19, 38, 0.9); padding: 10px 20px; border-radius: 5px; display: none; z-index: 3000; }
        #mulligan-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
        #scry-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        
        .token { 
            border: 2px dashed var(--mox-blue) !important; 
            background: #222 !important; 
            box-shadow: 0 0 10px rgba(0,123,255,0.3);
        }
    </style>
</head>
<body>

<div id="arena">
    <div id="board">
        <div id="board-header"><div class="turn-badge" id="turn-display">Turno 1</div></div>
        <div class="zone" data-label="Creatures" id="field-creatures" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        <div class="zone" data-label="Non-Creatures" id="field-others" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        <div class="zone" data-label="Lands" id="field-lands" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        <div id="bottom-bar">
            <div id="hand-container">
                <div class="pile-label">Hand</div>
                <div class="zone" id="hand" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            </div>
            <div class="pile-zone"><div class="pile-label">Lib (<span id="count-lib">0</span>)</div><div class="pile-visual sleeve" onclick="drawCard()"></div></div>
            <div class="pile-zone"><div class="pile-label">Grave (<span id="count-grave">0</span>)</div><div class="pile-visual" id="graveyard-visual" ondragover="allowDrop(event)" ondrop="drop(event)" data-zone="grave"></div></div>
            <div class="pile-zone"><div class="pile-label">Exile (<span id="count-exile">0</span>)</div><div class="pile-visual" id="exile-visual" ondragover="allowDrop(event)" ondrop="drop(event)" data-zone="exile"></div></div>
        </div>
    </div>
    <div id="sidebar">
        <div id="life-box">
            <button class="btn" style="width:100%; font-size:9px; background:#444; margin-bottom:5px" onclick="window.location.href='index.html'">HOME</button>
            <div class="life" id="life-display">40</div>
            <div style="display:flex; gap:5px; width:100%;"><button class="btn" style="flex:1" onclick="changeLife(-1)">-</button><button class="btn" style="flex:1" onclick="changeLife(1)">+</button></div>
        </div>

        <div id="mana-tracker">
            <div class="mana-stat"><div class="mana-val" id="mana-avail">0</div><div class="mana-lbl">Ready</div></div>
            <div class="mana-stat"><div class="mana-val" id="mana-total">0</div><div class="mana-lbl">Total</div></div>
            <div class="mana-stat"><div class="mana-val" id="mana-colors">-</div><div class="mana-lbl">Colors</div></div>
        </div>

        <button class="btn btn-blue" onclick="nextTurn()">Next Turn</button>
        <button class="btn btn-mulligan" onclick="openMulligan()">Mulligan</button>
        <button class="btn" style="background:#27ae60" onclick="toggleTokenMenu()">Tokens</button>
        <button class="btn" onclick="openScry()">Scry 1</button>
        <button class="btn" onclick="shuffleDeck()">Shuffle</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn" style="background:#a82331" onclick="location.reload()">Restart</button>
        <div id="commander-zone" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
    </div>
</div>

<div id="token-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:7000; flex-direction:column; align-items:center; justify-content:center;">
    <div style="background:#1a1a1a; padding:25px; border-radius:15px; border:2px solid #27ae60; text-align:center; max-width:500px;">
        <h2 style="color:#27ae60; margin-top:0;">Scegli Token</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
            <button class="btn" onclick="addToken('treasure')">💰 Tesoro</button>
            <button class="btn" onclick="addToken('elf')">⚔️ Elfo Guerriero 1/1</button>
            <button class="btn" onclick="addToken('soldier')">⚔️ Soldato 1/1</button>
            <button class="btn" onclick="addToken('food')">🍔 Cibo</button>
        </div>
        <button class="btn" style="background:#a82331; width:100%" onclick="closeTokenMenu()">Chiudi</button>
    </div>
</div>

<div id="mulligan-overlay"><div style="background:#1a1a1a; padding:30px; border-radius:15px; border:2px solid #e67e22; text-align:center;"><h2 style="color:#e67e22; margin-top:0;">MULLIGAN</h2><p>Quante carte vuoi pescare?</p><div style="display:flex; gap:10px; justify-content:center; margin-top:20px;"><button class="btn" onclick="executeMulligan(7)">7</button><button class="btn" onclick="executeMulligan(6)">6</button><button class="btn" onclick="executeMulligan(5)">5</button></div><button class="btn" style="margin-top:20px; background:#444; width:100%;" onclick="closeMulligan()">Annulla</button></div></div>
<div id="error-msg"></div>
<div id="scry-overlay"><div id="scry-content"></div><div style="display:flex; gap:15px; margin-top:20px"><button class="btn btn-blue" onclick="scryAction('top')">Sopra</button><button class="btn" onclick="scryAction('bottom')">Sotto</button><button class="btn" style="background:#a82331" onclick="closeScry()">Chiudi</button></div></div>

<script>
    let deck = [], hand = [], grave = [], exile = [], life = 40, turn = 1, draggedCardData = null;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let deckId = (urlParams.get('deck') || "").match(/\/decks\/([^?\/]+)/)?.[1] || (urlParams.get('deck') || "").split('/').pop();
        if (!deckId) return;
        try {
            const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(`https://api.moxfield.com/v2/decks/all/${deckId}`));
            const data = JSON.parse((await res.json()).contents);
            if (data.commanders) Object.values(data.commanders).forEach(c => { if(c.card) document.getElementById('commander-zone').appendChild(createCardUI(c.card, 'commander')); });
            deck = [];
            if (data.mainboard) Object.values(data.mainboard).forEach(info => { for (let i = 0; i < info.quantity; i++) deck.push(info.card); });
            shuffleDeck(false);
            for(let i=0; i<7; i++) if(deck.length > 0) hand.push(deck.pop());
            updateUI();
        } catch (err) { console.error("Errore mazzo", err); }
    }

    function updateManaTracker() {
        const lands = Array.from(document.querySelectorAll('#field-lands .card'));
        const untapped = lands.filter(l => !l.classList.contains('tapped'));
        document.getElementById('mana-total').innerText = lands.length;
        document.getElementById('mana-avail').innerText = untapped.length;
        let colors = new Set();
        lands.forEach(l => {
            const d = JSON.parse(l.dataset.cardData);
            (d.color_identity || []).forEach(c => colors.add(c));
        });
        document.getElementById('mana-colors').innerText = colors.size > 0 ? Array.from(colors).join('') : '-';
    }

    function createCardUI(cardData, loc) {
        const img = document.createElement('img');
        img.src = cardData.image_uris?.normal || `https://api.scryfall.com/cards/${cardData.scryfall_id}?format=image&version=normal`;
        img.className = 'card ' + (loc === 'hand' ? 'hand-card' : '');
        img.draggable = true;
        img.dataset.cardData = JSON.stringify(cardData);
        img.onclick = () => {
            const p = img.parentElement.id;
            if (p === 'hand' || p === 'commander-zone') playCard(cardData, p);
            else { img.classList.toggle('tapped'); updateManaTracker(); }
        };
        img.ondragstart = () => draggedCardData = cardData;
        img.ondragend = () => { document.querySelectorAll('.zone').forEach(z => z.classList.remove('drag-over')); updateManaTracker(); };
        return img;
    }

    function playCard(cardData, from) {
        const type = (cardData.type_line || "").toLowerCase();
        const isLand = type.includes('land');
        if (!isLand) {
            const cost = getManaDetails(cardData.mana_cost);
            const untapped = Array.from(document.querySelectorAll('#field-lands .card:not(.tapped)'));
            if (untapped.length < (cost.generic + cost.colors.length)) { showError("Mana insufficiente!"); return; }
            for (let i = 0; i < (cost.generic + cost.colors.length); i++) untapped[i].classList.add('tapped');
        }
        if (from === 'hand') hand = hand.filter(c => c.scryfall_id !== cardData.scryfall_id);
        const zoneId = isLand ? 'field-lands' : (type.includes('creature') ? 'field-creatures' : 'field-others');
        document.getElementById(zoneId).appendChild(createCardUI(cardData, 'field'));
        updateUI();
    }

    function updateUI() {
        const h = document.getElementById('hand'); h.innerHTML = '';
        hand.forEach(c => h.appendChild(createCardUI(c, 'hand')));
        document.getElementById('count-lib').innerText = deck.length;
        document.getElementById('count-grave').innerText = grave.length;
        document.getElementById('count-exile').innerText = exile.length;
        document.getElementById('graveyard-visual').innerHTML = grave.length > 0 ? `<img src="${grave[grave.length-1].image_uris?.normal}" style="width:100%">` : '';
        document.getElementById('exile-visual').innerHTML = exile.length > 0 ? `<img src="${exile[exile.length-1].image_uris?.normal}" style="width:100%">` : '';
        updateManaTracker();
    }

    function getManaDetails(m) {
        let colors = (m || "").match(/[A-Z]/g) || [], gen = (m || "").match(/\d+/);
        return { generic: gen ? parseInt(gen[0]) : 0, colors };
    }

    function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function drop(e) {
        e.preventDefault(); const z = e.currentTarget; if (!draggedCardData) return;
        document.querySelectorAll('.card').forEach(c => { if(JSON.parse(c.dataset.cardData).scryfall_id === draggedCardData.scryfall_id) c.remove(); });
        hand = hand.filter(c => c.scryfall_id !== draggedCardData.scryfall_id);
        grave = grave.filter(c => c.scryfall_id !== draggedCardData.scryfall_id);
        exile = exile.filter(c => c.scryfall_id !== draggedCardData.scryfall_id);
        if (z.dataset.zone === 'grave') grave.push(draggedCardData);
        else if (z.dataset.zone === 'exile') exile.push(draggedCardData);
        else if (z.id === 'hand') hand.push(draggedCardData);
        else z.appendChild(createCardUI(draggedCardData, 'field'));
        updateUI();
    }

    function openMulligan() { document.getElementById('mulligan-overlay').style.display = 'flex'; }
    function closeMulligan() { document.getElementById('mulligan-overlay').style.display = 'none'; }
    function executeMulligan(n) { deck.push(...hand); hand = []; shuffleDeck(false); for(let i=0; i<n; i++) if(deck.length > 0) hand.push(deck.pop()); closeMulligan(); updateUI(); }
    function shuffleDeck(r=true) { for (let i = deck.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [deck[i], deck[j]] = [deck[j], deck[i]]; } if(r) updateUI(); }
    function drawCard() { if (deck.length > 0) { hand.push(deck.pop()); updateUI(); } }
    function nextTurn() { turn++; document.getElementById('turn-display').innerText = `Turno ${turn}`; document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped')); drawCard(); }
    function changeLife(v) { life += v; document.getElementById('life-display').innerText = life; }
    function showError(m) { const e = document.getElementById('error-msg'); e.innerText = m; e.style.display = 'block'; setTimeout(() => e.style.display = 'none', 1500); }
    
    function openScry() {
        if (deck.length === 0) { showError("Mazzo vuoto!"); return; }
        const card = deck[deck.length - 1];
        const overlay = document.getElementById('scry-overlay');
        const content = document.getElementById('scry-content');
        overlay.style.display = 'flex';
        const imgUrl = card.image_uris ? card.image_uris.normal : `https://api.scryfall.com/cards/${card.scryfall_id}?format=image&version=normal`;
        content.innerHTML = `<div style="text-align:center; margin-bottom:20px;"><h3 style="color:var(--mox-blue); margin-bottom:10px;">SCRY 1</h3><img src="${imgUrl}" style="height:450px; border-radius:20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 2px solid #333;"></div>`;
    }

    function scryAction(pos) {
        const card = deck.pop();
        if (pos === 'top') { deck.push(card); showError("Carta rimessa in cima"); } 
        else { deck.unshift(card); showError("Carta messa in fondo"); }
        closeScry(); updateUI();
    }
    
    function closeScry() { document.getElementById('scry-overlay').style.display = 'none'; }

    function toggleTokenMenu() {
        document.getElementById('token-overlay').style.display = 'flex';
    }

    function closeTokenMenu() {
        document.getElementById('token-overlay').style.display = 'none';
    }

function addToken(type) {
    const tokens = {
        treasure: { 
            name: "Treasure", 
            type: "Artifact", 
            url: "https://cards.scryfall.io/large/front/b/b/bbe8bced-9524-47f6-a600-bf4ddc072698.jpg?1562539795" 
        },
        elf: { 
            name: "Elf Warrior", 
            type: "Creature", 
            url: "https://cards.scryfall.io/large/front/0/c/0c326a0a-a435-44c7-939a-8da6ed3c4510.jpg?1562639644" 
        },
        soldier: { 
            name: "Soldier", 
            type: "Creature", 
            url: "https://cards.scryfall.io/large/front/5/8/58ad9c94-8173-4bd9-a47e-bc438997363e.jpg?1562639803" 
        },
        food: { 
            name: "Food", 
            type: "Artifact", 
            url: "https://cards.scryfall.io/large/front/b/f/bf69022d-3031-402a-9993-379e57849e7b.jpg?1572482782" 
        }
    };

    const data = tokens[type];
    if (!data) return; // Sicurezza se il tipo non esiste

    const tokenData = {
        name: data.name,
        type_line: data.type,
        image_uris: { normal: data.url },
        scryfall_id: "token-" + Date.now()
    };

    const tokenUI = createCardUI(tokenData, 'field');
    tokenUI.classList.add('token');
    tokenUI.style.height = "130px";

    // Manda le creature nella zona giusta e gli artefatti in "others"
    const zoneId = data.type.includes("Creature") ? 'field-creatures' : 'field-others';
    document.getElementById(zoneId).appendChild(tokenUI);
    
    closeTokenMenu();
    showError(`Creato ${data.name}!`);
    updateManaTracker();
}
    
    window.onload = init;
</script>
</body>
</html>
