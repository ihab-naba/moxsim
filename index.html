<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoxSim Arena - Community Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #0f0f0f;
            --nav-bg: #1a1a1a;
            --accent: #007bff;
            --mox-purple: #7d5bbe;
            --text-main: #ffffff;
            --text-dim: #aaa;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* NAVBAR */
        .mox-nav {
            background: var(--nav-bg);
            height: 55px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { display: flex; gap: 25px; align-items: center; }
        .nav-left a { color: var(--text-dim); text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .nav-left a:hover { color: #fff; }
        .logo { color: white; font-weight: 900; letter-spacing: 1px; font-size: 18px; margin-right: 15px; }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .btn-text { background: transparent; border: none; color: var(--accent); font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-plus { 
            background: var(--mox-purple); color: white; border: none; width: 32px; height: 32px; 
            border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* LOADER SCREEN */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-content { text-align: center; }
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(125, 91, 190, 0.2);
            border-top: 5px solid var(--mox-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader h2 { letter-spacing: 4px; font-weight: 900; }
        #loader p { color: var(--mox-purple); font-family: monospace; font-size: 12px; }

        /* HERO & INPUT */
        .hero { padding: 80px 20px; text-align: center; background: radial-gradient(circle at center, #1e1e1e 0%, #0f0f0f 100%); }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; font-weight: 800; }
        .input-container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px 15px; border-radius: 8px; outline: none; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* DECK GRID */
        .deck-section { max-width: 1000px; margin: 50px auto; padding: 0 20px; }
        .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .deck-card { background: #181818; border: 1px solid #282828; padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .deck-card:hover { border-color: var(--accent); background: #222; }

        /* MODALE LOGIN */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #111; margin: 10% auto; padding: 40px; width: 300px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; color: #555; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-content">
        <div class="spinner"></div>
        <h2>PREPARANDO L'ARENA</h2>
        <p id="loader-status">Invocando le creature...</p>
    </div>
</div>

<nav class="mox-nav">
    <div class="nav-left">
        <span class="logo">MOXSIM</span>
        <a href="#">Home</a>
        <a href="#" onclick="scrollToDecks()">Your Decks</a>
        <a href="#">Explore</a>
    </div>
    <div class="nav-right" id="user-status">
        <button class="btn-text" onclick="openAuth()">Accedi Gratis</button>
        <button class="btn-plus" onclick="focusLoad()">+</button>
    </div>
</nav>

<div class="hero">
    <h1>PROVA QUI IL TUO COMMANDER</h1>
    <p style="color:var(--text-dim)">Simulatore di gioco per mazzi Moxfield.</p>
    <div class="input-container">
        <input type="text" id="deckUrl" placeholder="Incolla link Moxfield...">
        <input type="text" id="deckName" placeholder="Nome Mazzo" style="max-width: 150px;">
        <button class="btn-main" onclick="handleSaveDeck()">SALVA E GIOCA</button>
    </div>
</div>

<div class="deck-section" id="decks-area">
    <h2>I tuoi mazzi salvati</h2>
    <div class="deck-grid" id="deckLibrary"></div>
</div>

<div id="auth-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeAuth()">&times;</span>
        <h2 style="margin-top:0">Entra nell'Arena</h2>
        <input type="email" id="email" placeholder="Email" style="width: 90%; margin-bottom: 10px;">
        <input type="password" id="password" placeholder="Password" style="width: 90%; margin-bottom: 20px;">
        <button class="btn-main" style="width: 100%; height: 45px;" onclick="doAuth()">ACCEDI / REGISTRATI</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBoE1GSQ4mYeXLRdU5loogsebJ96yKXKAw",
        authDomain: "moxsim.firebaseapp.com",
        projectId: "moxsim",
        storageBucket: "moxsim.firebasestorage.app",
        messagingSenderId: "636688482652",
        appId: "1:636688482652:web:a90f1240e650e5a4ca4199",
        measurementId: "G-WELKXW65TR"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function openAuth() { document.getElementById('auth-modal').style.display = 'block'; }
    function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }

    auth.onAuthStateChanged(user => {
        updateNavbar(user);
        loadDecks(user);
    });

    function updateNavbar(user) {
        const statusDiv = document.getElementById('user-status');
        if (user) {
            statusDiv.innerHTML = `<span style="font-size:12px;color:#888">${user.email}</span>
            <button class="btn-text" style="color:#ff4757" onclick="auth.signOut()">Esci</button>
            <button class="btn-plus" onclick="focusLoad()">+</button>`;
        } else {
            statusDiv.innerHTML = `<button class="btn-text" onclick="openAuth()">Accedi Gratis</button>
            <button class="btn-plus" onclick="openAuth()">+</button>`;
        }
    }

    async function doAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try { await auth.signInWithEmailAndPassword(e, p); } 
        catch { await auth.createUserWithEmailAndPassword(e, p); }
        closeAuth();
    }

    async function handleSaveDeck() {
        const url = document.getElementById('deckUrl').value;
        const name = document.getElementById('deckName').value || "Nuovo Mazzo";
        if (!url.includes("moxfield.com")) return alert("Link non valido!");

        // MOSTRA LOADER
        document.getElementById('loader').style.display = 'flex';
        const status = document.getElementById('loader-status');
        setTimeout(() => status.innerText = "Mescolando il mazzo...", 800);
        setTimeout(() => status.innerText = "Caricando i Mana...", 1600);

        if (auth.currentUser) {
            await db.collection("decks").add({ uid: auth.currentUser.uid, name, url, date: new Date() });
        }
        
        setTimeout(() => { window.location.href = `game.html?deck=${encodeURIComponent(url)}`; }, 2500);
    }

    async function loadDecks(user) {
        const container = document.getElementById('deckLibrary');
        if (!user) { container.innerHTML = "<p style='color:#444'>Accedi per salvare i mazzi nel cloud.</p>"; return; }
        const snapshot = await db.collection("decks").where("uid", "==", user.uid).get();
        container.innerHTML = "";
        snapshot.forEach(doc => {
            const d = doc.data();
            const card = document.createElement('div');
            card.className = 'deck-card';
            card.onclick = () => {
                document.getElementById('loader').style.display = 'flex';
                setTimeout(() => { window.location.href = `game.html?deck=${encodeURIComponent(d.url)}`; }, 1500);
            };
            card.innerHTML = `<h3>${d.name}</h3><p>Moxfield Deck</p>`;
            container.appendChild(card);
        });
    }

    function focusLoad() { document.getElementById('deckUrl').focus(); }
    function scrollToDecks() { document.getElementById('decks-area').scrollIntoView({behavior:"smooth"}); }
</script>
</body>
</html>
