<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Goldfish V15</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #000; --panel: #111; --gray: #888; --sleeve-color: #2c3e50; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #arena { display: grid; grid-template-columns: 1fr 280px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 8px; }
        
        /* HEADER BOARD */
        #board-header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; height: 30px; }
        .turn-info { color: var(--mox-blue); font-weight: bold; font-size: 14px; border: 1px solid #333; padding: 4px 12px; border-radius: 20px; }

        .zone { 
            background: var(--panel); border: 1px solid #222; border-radius: 8px; 
            position: relative; display: flex; align-items: center; padding: 25px 10px 5px; gap: 10px; flex: 1;
            min-height: 0; overflow-x: auto; transition: 0.3s;
        }
        .zone::before { content: attr(data-label); position: absolute; top: 5px; left: 10px; font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }

        #bottom-bar { display: flex; height: 160px; gap: 10px; flex-shrink: 0; }
        
        /* HAND & PILES */
        #hand { flex: 2.5; justify-content: center; overflow: visible !important; z-index: 100; border-color: #333; }
        #hand .card { height: 110px; margin-right: -40px; transition: 0.2s ease; position: relative; }
        #hand .card:hover { transform: translateY(-80px) scale(2.4); z-index: 1000 !important; margin: 0 40px; }

        .pile-zone { flex: 0.6; justify-content: center; flex-direction: column; text-align: center; font-size: 12px; }
        .pile-visual { 
            width: 75px; height: 105px; border-radius: 6px; border: 1px solid #444; 
            background: #000; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .pile-visual img { width: 100%; height: 100%; border-radius: 5px; object-fit: cover; }
        
        /* SLEEVE */
        .sleeve { background: var(--sleeve-color); border: 2px solid #fff; }

        /* CARDS */
        .card { height: 120px; border-radius: 7px; cursor: pointer; flex-shrink: 0; transition: 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .field-card:hover { outline: 2px solid var(--mox-blue); }
        .tapped { transform: rotate(90deg); margin: 0 25px; filter: brightness(0.7); }

        /* SIDEBAR */
        #sidebar { border-left: 1px solid #222; padding: 10px; display: flex; flex-direction: column; gap: 10px; background: #080808; }
        .life { font-size: 50px; text-align: center; color: white; font-weight: bold; margin: 10px 0; text-shadow: 0 0 15px var(--mox-blue); }
        
        .btn { background: #333; border: none; padding: 12px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 12px; width: 100%; transition: 0.2s; }
        .btn:hover { background: #444; }
        .btn-blue { background: var(--mox-blue); }
        .btn-red { background: #d11326; }
        .btn-orange { background: #e67e22; }

        #commander-zone { height: 130px; border: 1px dashed #333; border-radius: 8px; display: flex; justify-content: center; align-items: center; margin-top: auto; }
        
        /* SCRY OVERLAY */
        #scry-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="arena">
    <div id="board">
        <div id="board-header">
            <div class="turn-info" id="turn-display">Turno 1</div>
            <div style="font-size: 11px; color: var(--gray);">MoxSim Arena - Goldfish Mode</div>
        </div>
        <div class="zone" data-label="Creatures" id="field-creatures"></div>
        <div class="zone" data-label="Non-Creatures" id="field-others"></div>
        <div class="zone" data-label="Lands" id="field-lands"></div>
        
        <div id="bottom-bar">
            <div class="zone" data-label="Hand" id="hand"></div>
            
            <div class="pile-zone">
                <div style="margin-bottom:4px">Library (<span id="count-lib">0</span>)</div>
                <div class="pile-visual sleeve" id="lib-visual" onclick="drawCard()"></div>
                <select id="sleeve-selector" onchange="changeSleeve(this.value)" style="width:75px; font-size:9px; margin-top:4px">
                    <option value="#2c3e50">Blue</option>
                    <option value="#1abc9c">Green-Teal</option>
                    <option value="#c0392b">Red</option>
                    <option value="#8e44ad">Purple</option>
                </select>
            </div>

            <div class="pile-zone">
                <div style="margin-bottom:4px">Graveyard (<span id="count-grave">0</span>)</div>
                <div class="pile-visual" id="grave-visual"></div>
            </div>

            <div class="pile-zone">
                <div style="margin-bottom:4px">Exile (<span id="count-exile">0</span>)</div>
                <div class="pile-visual" id="exile-visual"></div>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div style="text-align:right; font-size: 11px; color: var(--gray); cursor:pointer" onclick="window.location.href='index.html'">← ESCI</div>
        <div class="life" id="life-display">40</div>
        <div style="display:flex; gap:5px;">
            <button class="btn" onclick="changeLife(-1)">-</button>
            <button class="btn" onclick="changeLife(1)">+</button>
        </div>
        <button class="btn btn-blue" onclick="nextTurn()">Next Turn</button>
        <button class="btn" onclick="openScry()">Scry 1</button>
        <button class="btn" onclick="shuffleDeck()">Shuffle</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn-red btn" onclick="location.reload()">Restart</button>
        <div id="commander-zone" data-label="COMMANDER"></div>
    </div>
</div>

<div id="scry-overlay">
    <h2 id="scry-title">Scry</h2>
    <div id="scry-cards" style="display:flex; gap:20px; margin-bottom:30px"></div>
    <button class="btn btn-blue" style="width:200px" onclick="closeScry()">Chiudi</button>
</div>

<script>
    let deck = [], hand = [], grave = [], exile = [];
    let life = 40, turn = 1;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let deckUrl = urlParams.get('deck');
        if (!deckUrl) return;
        const deckId = deckUrl.match(/\/decks\/([^?\/]+)/)?.[1] || deckUrl.split('/').pop();
        
        try {
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent(`https://api.moxfield.com/v2/decks/all/${deckId}`);
            const response = await fetch(proxy + target);
            const json = await response.json();
            const data = JSON.parse(json.contents);

            if (data.commanders) {
                Object.values(data.commanders).forEach(c => {
                    document.getElementById('commander-zone').appendChild(createCardUI(c.card, 'commander'));
                });
            }

            deck = [];
            Object.values(data.mainboard).forEach(info => {
                for (let i = 0; i < info.quantity; i++) { deck.push(info.card); }
            });

            shuffleArray(deck);
            for(let i=0; i<7; i++) { if(deck.length > 0) hand.push(deck.pop()); }
            updateUI();
        } catch (err) { alert("Errore caricamento mazzo."); }
    }

    function createCardUI(cardData, location = 'hand') {
        const img = document.createElement('img');
        const scryId = cardData.scryfall_id;
        img.src = `https://api.scryfall.com/cards/${scryId}?format=image&version=normal`;
        img.className = (location === 'hand' || location === 'commander') ? 'card' : 'card field-card';
        img.dataset.face = "front";

        img.onclick = (e) => {
            if (e.shiftKey) { // Shift+Click per mandare al Cimitero
                moveToZone(cardData, 'grave', img);
                return;
            }
            if (location === 'hand' || location === 'commander') {
                playCard(cardData, location);
                img.remove();
            } else {
                img.classList.toggle('tapped');
            }
        };

        img.oncontextmenu = (e) => {
            e.preventDefault();
            const hasBack = cardData.card_faces && cardData.card_faces.length > 1;
            if (img.dataset.face === "front") {
                img.src = hasBack ? `https://api.scryfall.com/cards/${scryId}?format=image&version=normal&face=back` : `https://cards.scryfall.io/large/back.jpg`;
                img.dataset.face = "back";
            } else {
                img.src = `https://api.scryfall.com/cards/${scryId}?format=image&version=normal`;
                img.dataset.face = "front";
            }
        };

        return img;
    }

    function moveToZone(cardData, zoneName, element) {
        if (element) element.remove();
        if (zoneName === 'grave') {
            grave.push(cardData);
            document.getElementById('grave-visual').innerHTML = `<img src="https://api.scryfall.com/cards/${cardData.scryfall_id}?format=image&version=small">`;
        } else if (zoneName === 'exile') {
            exile.push(cardData);
            document.getElementById('exile-visual').innerHTML = `<img src="https://api.scryfall.com/cards/${cardData.scryfall_id}?format=image&version=small">`;
        }
        updateUI();
    }

    function playCard(cardData, from) {
        if (from === 'hand') {
            const idx = hand.findIndex(c => c.scryfall_id === cardData.scryfall_id);
            if (idx > -1) hand.splice(idx, 1);
        }
        const type = (cardData.type_line || "").toLowerCase();
        let zoneId = type.includes('land') ? 'field-lands' : (type.includes('creature') ? 'field-creatures' : 'field-others');
        document.getElementById(zoneId).appendChild(createCardUI(cardData, 'field'));
        updateUI();
    }

    function openScry() {
        if (deck.length === 0) return;
        const card = deck[deck.length - 1];
        const overlay = document.getElementById('scry-overlay');
        const container = document.getElementById('scry-cards');
        container.innerHTML = '';
        overlay.style.display = 'flex';
        
        const img = document.createElement('img');
        img.src = `https://api.scryfall.com/cards/${card.scryfall_id}?format=image&version=normal`;
        img.className = 'card';
        img.style.height = '300px';
        container.appendChild(img);
    }

    function closeScry() { document.getElementById('scry-overlay').style.display = 'none'; }

    function nextTurn() {
        turn++;
        document.getElementById('turn-display').innerText = `Turno ${turn}`;
        document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped'));
        drawCard();
    }

    function updateUI() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = '';
        hand.forEach(c => handDiv.appendChild(createCardUI(c, 'hand')));
        document.getElementById('count-lib').innerText = deck.length;
        document.getElementById('count-grave').innerText = grave.length;
        document.getElementById('count-exile').innerText = exile.length;
    }

    function changeLife(v) { life += v; document.getElementById('life-display').innerText = life; }
    function drawCard() { if (deck.length > 0) { hand.push(deck.pop()); updateUI(); } }
    function shuffleDeck() { shuffleArray(deck); updateUI(); alert("Mazzo mescolato!"); }
    function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }
    function changeSleeve(color) { document.documentElement.style.setProperty('--sleeve-color', color); }

    window.onload = init;
</script>
</body>
</html>
