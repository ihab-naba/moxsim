<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Goldfish V14</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #000; --panel: #0d0d0d; --gray: #888; --sleeve-color: #2c3e50; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #arena { display: grid; grid-template-columns: 1fr 300px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 8px; }
        
        .zone { 
            background: var(--panel); border: 1px solid var(--mox-blue); border-radius: 12px; 
            position: relative; display: flex; align-items: center; padding: 25px 10px 5px; gap: 10px; flex: 1;
            min-height: 0; overflow-x: auto;
        }
        .zone::before { content: attr(data-label); position: absolute; top: 5px; left: 10px; font-size: 10px; color: var(--gray); font-weight: bold; }

        #bottom-bar { display: flex; height: 140px; gap: 8px; flex-shrink: 0; }
        
        /* HAND */
        #hand { flex: 2.5; justify-content: center; overflow: visible !important; z-index: 100; }
        #hand .card { height: 100px; margin-right: -35px; transition: 0.25s ease; position: relative; z-index: 10; }
        #hand .card:hover { transform: translateY(-110px) scale(2.6); z-index: 1000 !important; margin: 0 45px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); }

        /* LIBRARY & SLEEVES */
        .small-zone { flex: 0.6; justify-content: center; flex-direction: column; gap: 5px; }
        .sleeve-back { 
            width: 70px; height: 98px; background: var(--sleeve-color); border-radius: 5px; 
            border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: background 0.3s;
        }
        #sleeve-selector { 
            background: #1a1a1a; color: white; border: 1px solid var(--gray); 
            font-size: 10px; border-radius: 4px; cursor: pointer; width: 80%;
        }

        .count-badge { position: absolute; top: 30px; right: 15px; background: rgba(0,0,0,0.8); color: white; padding: 1px 5px; border-radius: 4px; font-size: 11px; font-weight: bold; }

        /* FIELD CARDS */
        .card { height: 120px; border-radius: 7px; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .field-card:hover { filter: brightness(1.2); outline: 2px solid var(--mox-blue); }
        .tapped { transform: rotate(90deg); margin: 0 25px; filter: brightness(0.6) !important; }

        #sidebar { border: 1px solid var(--mox-blue); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .life { font-size: 60px; text-align: center; color: var(--mox-blue); font-weight: bold; margin: 0; }
        
        .btn { background: #9a73ef; border: none; padding: 10px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-red { background: #d11326; }
        
        #commander-zone { margin-top: auto; height: 140px; border: 1px solid var(--mox-blue); border-radius: 12px; display: flex; justify-content: center; align-items: center; }
        #commander-zone .card { height: 120px; }
    </style>
</head>
<body>

<div id="arena">
    <div id="board">
        <div class="zone" data-label="CREATURES" id="field-creatures"></div>
        <div class="zone" data-label="OTHERS" id="field-others"></div>
        <div class="zone" data-label="LANDS" id="field-lands"></div>
        <div id="bottom-bar">
            <div class="zone" data-label="HAND" id="hand"></div>
            <div class="zone small-zone" data-label="LIBRARY" id="library">
                <div class="sleeve-back" id="sleeve-visual"></div>
                <select id="sleeve-selector" onchange="changeSleeve(this.value)">
                    <option value="#2c3e50">Dark Blue</option>
                    <option value="#b22222">Fire Red</option>
                    <option value="#228b22">Forest Green</option>
                    <option value="#4b0082">Phyrexian Purple</option>
                    <option value="#d4af37">Gold</option>
                    <option value="#ff69b4">MoxPink</option>
                </select>
                <div class="count-badge" id="card-count">0</div>
            </div>
            <div class="zone small-zone" data-label="GRAVEYARD" id="graveyard"></div>
            <div class="zone small-zone" data-label="EXILE" id="exile"></div>
        </div>
    </div>

    <div id="sidebar">
        <div style="text-align:right; font-size: 11px; cursor: pointer; color: var(--gray);" onclick="window.location.href='index.html'">← ESCI</div>
        <div class="life" id="life-display">40</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn" style="flex:1" onclick="changeLife(-1)">-</button>
            <button class="btn" style="flex:1" onclick="changeLife(1)">+</button>
        </div>
        <button class="btn" onclick="untapAll()">Untap All</button>
        <button class="btn" onclick="shuffleDeck()">Shuffle</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn-red btn" onclick="location.reload()">Restart</button>
        <div id="commander-zone" data-label="COMMANDER"></div>
    </div>
</div>

<script>
    let deck = [];
    let hand = [];
    let life = 40;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let deckUrl = urlParams.get('deck');
        if (!deckUrl) return;
        const deckId = deckUrl.match(/\/decks\/([^?\/]+)/)?.[1] || deckUrl.split('/').pop();
        
        try {
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent(`https://api.moxfield.com/v2/decks/all/${deckId}`);
            const response = await fetch(proxy + target);
            const json = await response.json();
            const data = JSON.parse(json.contents);

            if (data.commanders) {
                Object.values(data.commanders).forEach(c => {
                    document.getElementById('commander-zone').appendChild(createCardUI(c.card, 'commander'));
                });
            }

            deck = [];
            Object.values(data.mainboard).forEach(info => {
                for (let i = 0; i < info.quantity; i++) { deck.push(info.card); }
            });

            shuffleArray(deck);
            for(let i=0; i<7; i++) { if(deck.length > 0) hand.push(deck.pop()); }
            updateUI();
        } catch (err) { alert("Mazzo non caricato. Verifica il link!"); }
    }

    function changeSleeve(color) {
        document.documentElement.style.setProperty('--sleeve-color', color);
    }

    function createCardUI(cardData, location = 'hand') {
        const img = document.createElement('img');
        const scryId = cardData.scryfall_id;
        
        img.src = `https://api.scryfall.com/cards/${scryId}?format=image&version=normal`;
        img.dataset.face = "front";
        img.className = (location === 'hand' || location === 'commander') ? 'card' : 'card field-card';
        
        img.onclick = () => {
            if (location === 'hand' || location === 'commander') {
                playCard(cardData, location);
                if (location === 'commander') img.remove();
            } else {
                img.classList.toggle('tapped');
            }
        };

        img.oncontextmenu = (e) => {
            e.preventDefault();
            const hasBack = cardData.card_faces && cardData.card_faces.length > 1;
            if (img.dataset.face === "front") {
                img.src = hasBack 
                    ? `https://api.scryfall.com/cards/${scryId}?format=image&version=normal&face=back`
                    : `https://cards.scryfall.io/large/back.jpg`; // Retro standard per le normali
                img.dataset.face = "back";
            } else {
                img.src = `https://api.scryfall.com/cards/${scryId}?format=image&version=normal`;
                img.dataset.face = "front";
            }
        };
        return img;
    }

    function playCard(cardData, from = 'hand') {
        if (from === 'hand') {
            const idx = hand.findIndex(c => c.scryfall_id === cardData.scryfall_id);
            if (idx > -1) hand.splice(idx, 1);
        }
        const type = (cardData.type_line || "").toLowerCase();
        let zoneId = type.includes('land') ? 'field-lands' : (type.includes('creature') ? 'field-creatures' : 'field-others');
        document.getElementById(zoneId).appendChild(createCardUI(cardData, 'field'));
        updateUI();
    }

    function updateUI() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = '';
        hand.forEach(c => handDiv.appendChild(createCardUI(c, 'hand')));
        document.getElementById('card-count').innerText = deck.length;
        document.getElementById('sleeve-visual').style.display = deck.length > 0 ? 'block' : 'none';
    }

    function untapAll() { document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped')); }
    function shuffleDeck() { shuffleArray(deck); updateUI(); }
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }
    function drawCard() { if (deck.length > 0) { hand.push(deck.pop()); updateUI(); } }
    function changeLife(v) { life += v; document.getElementById('life-display').innerText = life; }

    window.onload = init;
</script>
</body>
</html>
