<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Goldfish</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #000; --panel: #0d0d0d; --gray: #888; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #arena { display: grid; grid-template-columns: 1fr 300px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 8px; }
        
        .zone { 
            background: var(--panel); border: 1px solid var(--mox-blue); border-radius: 10px; 
            position: relative; display: flex; align-items: center; padding: 25px 10px 5px; gap: 8px; overflow-x: auto; flex: 1;
        }
        .zone::before { content: attr(data-label); position: absolute; top: 5px; left: 10px; font-size: 10px; color: var(--gray); font-weight: bold; }

        #bottom-bar { display: flex; height: 180px; gap: 8px; }
        #hand { flex: 2.5; }
        .small-zone { flex: 0.6; justify-content: center; }

        .card { height: 140px; border-radius: 7px; cursor: pointer; transition: 0.2s; flex-shrink: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .card:hover { transform: translateY(-10px); z-index: 10; box-shadow: 0 0 10px var(--mox-blue); }

        /* Animazione Shuffle */
        @keyframes shuffleAnim { 0% {transform: rotate(0)} 25% {transform: rotate(5deg) scale(1.1)} 75% {transform: rotate(-5deg)} 100% {transform: rotate(0)} }
        .shuffling img { animation: shuffleAnim 0.2s infinite; }

        #sidebar { border: 1px solid var(--mox-blue); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .life { font-size: 60px; text-align: center; color: var(--mox-blue); font-weight: bold; margin: 10px 0; }
        .btn { background: linear-gradient(#b598f3, #7d5bbe); border: none; padding: 12px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; }
        .btn-red { background: linear-gradient(#e63946, #a30b18); }
        #commander-zone { margin-top: auto; height: 180px; border: 1px solid var(--mox-blue); border-radius: 8px; display: flex; justify-content: center; align-items: center; position: relative; }
        .count { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>

<div id="arena">
    <div id="board">
        <div class="zone" data-label="CREATURES" id="field-creatures"></div>
        <div class="zone" data-label="OTHERS" id="field-others"></div>
        <div class="zone" data-label="LANDS" id="field-lands"></div>
        <div id="bottom-bar">
            <div class="zone" data-label="LA TUA MANO" id="hand"></div>
            <div class="zone small-zone" data-label="MAZZO" id="library"></div>
            <div class="zone small-zone" data-label="CIMITERO" id="graveyard"></div>
        </div>
    </div>

    <div id="sidebar">
        <div style="font-size: 12px; cursor: pointer;" onclick="window.location.href='index.html'">← ESCI</div>
        <div class="life" id="life-display">40</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn" style="width:50px" onclick="changeLife(-1)">-</button>
            <button class="btn" style="width:50px" onclick="changeLife(1)">+</button>
        </div>
        <button class="btn" onclick="shuffleDeck()">Shuffle</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn btn-red" onclick="location.reload()">Restart</button>
        <div id="commander-zone" data-label="COMMANDER"></div>
    </div>
</div>

<script>
    let deck = [];
    let hand = [];
    let life = 40;

    async function loadDeck() {
        const urlParams = new URLSearchParams(window.location.search);
        const fullUrl = urlParams.get('deck');
        if (!fullUrl) return;

        // Estrazione pulita ID
        const deckId = fullUrl.split('/decks/')[1]?.split('?')[0] || fullUrl.split('/').pop();
        
        try {
            // Utilizziamo un proxy CORS affidabile per bypassare il blocco
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.moxfield.com/v2/decks/all/' + deckId)}`);
            const json = await response.json();
            const data = JSON.parse(json.contents);

            // Carica Comandante
            if (data.commanders) {
                const cz = document.getElementById('commander-zone');
                Object.values(data.commanders).forEach(c => {
                    cz.appendChild(createCardUI(c.card, false));
                });
            }

            // Popola Mazzo
            deck = [];
            for (const [name, info] of Object.entries(data.mainboard)) {
                for (let i = 0; i < info.quantity; i++) {
                    deck.push(info.card);
                }
            }

            shuffleArray(deck);
            // Pesca iniziale di 7
            for(let i=0; i<7; i++) drawCard(false);
            
            updateUI();
        } catch (err) {
            console.error(err);
            alert("Errore critico: Il mazzo è privato o il link non è corretto.");
        }
    }

    function createCardUI(cardData, isHand = true) {
        const img = document.createElement('img');
        img.src = `https://api.scryfall.com/cards/${cardData.scryfall_id}?format=image&version=normal`;
        img.className = 'card';
        if (isHand) {
            img.onclick = () => playCard(cardData);
        }
        return img;
    }

    function playCard(cardData) {
        const idx = hand.findIndex(c => c.scryfall_id === cardData.scryfall_id);
        if (idx > -1) {
            hand.splice(idx, 1);
            let zoneId = 'field-others';
            const type = cardData.type_line.toLowerCase();
            if (type.includes('land')) zoneId = 'field-lands';
            else if (type.includes('creature')) zoneId = 'field-creatures';
            
            document.getElementById(zoneId).appendChild(createCardUI(cardData, false));
            updateUI();
        }
    }

    function shuffleDeck() {
        const libDiv = document.getElementById('library');
        libDiv.classList.add('shuffling');
        setTimeout(() => {
            shuffleArray(deck);
            libDiv.classList.remove('shuffling');
            updateUI();
        }, 600);
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function drawCard(refresh = true) {
        if (deck.length > 0) {
            hand.push(deck.pop());
            if (refresh) updateUI();
        }
    }

    function updateUI() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = '';
        hand.forEach(c => handDiv.appendChild(createCardUI(c, true)));

        const libDiv = document.getElementById('library');
        libDiv.innerHTML = deck.length > 0 ? 
            `<img src="https://cards.scryfall.io/large/back.jpg" class="card"><div class="count">${deck.length}</div>` : '';
    }

    function changeLife(v) {
        life += v;
        document.getElementById('life-display').innerText = life;
    }

    window.onload = loadDeck;
</script>
</body>
</html>
