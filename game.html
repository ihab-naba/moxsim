<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Goldfish V29</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #0b0b0b; --panel: #161616; --gray: #aaa; --sleeve-color: #1abc9c; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #arena { display: grid; grid-template-columns: 1fr 280px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 10px; }
        .turn-badge { background: #1a1a1a; border: 1px solid #333; padding: 4px 15px; border-radius: 4px; font-weight: bold; color: var(--mox-blue); font-size: 13px; width: fit-content; }
        .zone { background: var(--panel); border: 1px solid #282828; border-radius: 8px; position: relative; display: flex; align-items: center; padding: 30px 10px 10px; gap: 12px; flex: 1; min-height: 0; overflow-x: auto; transition: background 0.2s; }
        .zone.drag-over { border-color: var(--mox-blue); background: #222; }
        .zone::before { content: attr(data-label); position: absolute; top: 8px; left: 12px; font-size: 11px; color: var(--gray); font-weight: bold; text-transform: uppercase; }
        #bottom-bar { display: flex; height: 180px; gap: 10px; flex-shrink: 0; }
        #hand { flex: 2.5; justify-content: center; overflow: visible !important; }
        .pile-zone { flex: 0.6; display: flex; flex-direction: column; align-items: center; }
        .pile-label { font-size: 11px; margin-bottom: 5px; color: var(--gray); text-transform: uppercase; }
        .pile-visual { width: 85px; height: 118px; border-radius: 8px; border: 1px solid #333; background: #000; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .sleeve { background: var(--sleeve-color); border: 2px solid #fff; }
        .card { height: 130px; border-radius: 8px; cursor: grab; flex-shrink: 0; transition: transform 0.1s; user-select: none; }
        .hand-card { margin-right: -50px; }
        .hand-card:hover { transform: translateY(-80px) scale(2.2); z-index: 1000 !important; margin: 0 40px; }
        .tapped { transform: rotate(90deg); margin: 0 35px; filter: brightness(0.7); }
        #sidebar { border-left: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0c0c0c; }
        .life-box { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .life { font-size: 64px; font-weight: bold; margin: 5px 0; }
        .btn { background: #2a2a2a; border: none; padding: 12px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; width: 100%; }
        .btn-blue { background: var(--mox-blue); }
        .btn-green { background: #27ae60; }
        #commander-zone { height: 140px; border: 1px solid #333; border-radius: 8px; display: flex; justify-content: center; align-items: center; background: #111; position: relative; }
        #commander-zone::before { content: "COMMANDER"; position: absolute; top: 5px; font-size: 9px; color: #555; }
        #token-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 20px; border-radius: 12px; border: 2px solid var(--mox-blue); z-index: 4000; flex-direction: column; width: 300px; max-height: 80vh; }
        #token-list { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .btn-token { background: #333; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; text-align: left; }
        .btn-token:hover { background: #444; }
        .btn-token img { width: 35px; border-radius: 3px; }
        #scry-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="arena">
    <div id="board">
        <div class="turn-badge" id="turn-display">Turno 1</div>
        <div class="zone" data-label="Creatures" id="field-creatures" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        <div class="zone" data-label="Non-Creatures" id="field-others" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        <div class="zone" data-label="Lands" id="field-lands" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
        <div id="bottom-bar">
            <div class="zone" data-label="Hand" id="hand" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            <div class="pile-zone">
                <div class="pile-label">Library (<span id="count-lib">0</span>)</div>
                <div class="pile-visual sleeve" onclick="drawCard()"></div>
            </div>
            <div class="pile-zone">
                <div class="pile-label">Grave (<span id="count-grave">0</span>)</div>
                <div class="pile-visual" id="grave-visual" ondragover="allowDrop(event)" ondrop="drop(event)" data-zone="grave"></div>
            </div>
        </div>
    </div>
    <div id="sidebar">
        <div class="life-box">
            <div class="life" id="life-display">40</div>
            <div style="display:flex; gap:5px;"><button class="btn" onclick="changeLife(-1)">-</button><button class="btn" onclick="changeLife(1)">+</button></div>
        </div>
        <button class="btn btn-blue" onclick="nextTurn()">Next Turn</button>
        <button class="btn btn-green" onclick="toggleTokenMenu()">Tokens</button>
        <button class="btn" onclick="openScry()">Scry 1</button>
        <button class="btn" onclick="shuffleDeck()">Shuffle</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn" style="background:#a82331; margin-top: auto;" onclick="location.reload()">Reset</button>
        <div id="commander-zone" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
    </div>
</div>

<div id="token-menu">
    <div style="font-weight:bold; color:var(--gray); margin-bottom:10px;">Token del Mazzo</div>
    <div id="token-list"></div>
    <button class="btn" onclick="toggleTokenMenu()">Chiudi</button>
</div>

<div id="scry-overlay">
    <div id="scry-content"></div>
    <div style="display:flex; gap:10px; margin-top:20px;">
        <button class="btn btn-blue" onclick="scryAction('top')">Sopra</button>
        <button class="btn" onclick="scryAction('bottom')">Sotto</button>
    </div>
</div>

<script>
    let deck = [], hand = [], grave = [], tokensData = [];
    let life = 40, turn = 1, draggedCardData = null;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let deckUrl = urlParams.get('deck') || "";
        const deckId = deckUrl.match(/\/decks\/([^?\/]+)/)?.[1] || deckUrl.split('/').pop();
        if (!deckId) return alert("Inserisci un link Moxfield valido!");

        try {
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent(`https://api.moxfield.com/v2/decks/all/${deckId}`);
            const response = await fetch(proxy + target);
            const rawData = await response.json();
            const data = JSON.parse(rawData.contents);
            
            // 1. Carica Comandanti
            if (data.commanders) {
                Object.values(data.commanders).forEach(c => {
                    document.getElementById('commander-zone').appendChild(createCardUI(c.card, 'field'));
                });
            }

            // 2. Carica Mainboard (Fix Robustezza)
            deck = [];
            if (data.mainboard) {
                for (const key in data.mainboard) {
                    const item = data.mainboard[key];
                    for (let i = 0; i < item.quantity; i++) {
                        deck.push(item.card);
                    }
                }
            }

            // 3. Carica Token Dinamici
            tokensData = [];
            if (data.tokens) {
                tokensData = Object.values(data.tokens).map(t => t.card);
                populateTokenMenu();
            }

            shuffleDeck();
            for(let i=0; i<7; i++) { if(deck.length > 0) hand.push(deck.pop()); }
            updateUI();
        } catch (err) {
            console.error("Errore fatale:", err);
            alert("Errore nel caricamento del mazzo. Riprova.");
        }
    }

    function createCardUI(cardData, loc) {
        if (!cardData || !cardData.scryfall_id) return document.createElement('div');
        const img = document.createElement('img');
        img.src = `https://api.scryfall.com/cards/${cardData.scryfall_id}?format=image&version=normal`;
        img.className = 'card ' + (loc === 'hand' ? 'hand-card' : '');
        img.dataset.cardData = JSON.stringify(cardData);
        img.draggable = true;
        
        img.onclick = (e) => {
            e.stopPropagation();
            if (img.parentElement.id === 'hand') playCard(cardData);
            else if (img.parentElement.id.includes('field')) img.classList.toggle('tapped');
        };

        img.ondragstart = (e) => {
            draggedCardData = { data: cardData, fromId: img.parentElement.id };
            e.dataTransfer.setData("text/plain", ""); // Necessario per Firefox
        };

        return img;
    }

    function playCard(cardData) {
        hand = hand.filter(c => c.scryfall_id !== cardData.scryfall_id);
        const type = (cardData.type_line || "").toLowerCase();
        const zoneId = type.includes('land') ? 'field-lands' : (type.includes('creature') ? 'field-creatures' : 'field-others');
        document.getElementById(zoneId).appendChild(createCardUI(cardData, 'field'));
        updateUI();
    }

    function populateTokenMenu() {
        const list = document.getElementById('token-list');
        list.innerHTML = '';
        tokensData.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'btn-token';
            btn.onclick = () => {
                const zoneId = (t.type_line || "").toLowerCase().includes('creature') ? 'field-creatures' : 'field-others';
                document.getElementById(zoneId).appendChild(createCardUI({...t, isToken: true}, 'field'));
                toggleTokenMenu();
            };
            btn.innerHTML = `<img src="https://api.scryfall.com/cards/${t.scryfall_id}?format=image&version=small"> <span>${t.name}</span>`;
            list.appendChild(btn);
        });
    }

    function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    
    function drop(e) {
        e.preventDefault();
        const zone = e.currentTarget;
        zone.classList.remove('drag-over');
        if (!draggedCardData) return;

        // Rimuovi visivamente da dovunque fosse
        document.querySelectorAll('.card').forEach(c => {
            const d = JSON.parse(c.dataset.cardData);
            if(d.scryfall_id === draggedCardData.data.scryfall_id && c.parentElement.id === draggedCardData.fromId) c.remove();
        });

        if (zone.id === 'hand') {
            hand.push(draggedCardData.data);
        } else if (zone.dataset.zone === 'grave') {
            grave.push(draggedCardData.data);
        } else {
            zone.appendChild(createCardUI(draggedCardData.data, 'field'));
        }
        updateUI();
        draggedCardData = null;
    }

    function updateUI() {
        const h = document.getElementById('hand');
        h.innerHTML = '';
        hand.forEach(c => h.appendChild(createCardUI(c, 'hand')));
        document.getElementById('count-lib').innerText = deck.length;
        document.getElementById('count-grave').innerText = grave.length;
        if(grave.length > 0) {
            document.getElementById('grave-visual').innerHTML = `<img src="https://api.scryfall.com/cards/${grave[grave.length-1].scryfall_id}?format=image&version=small" style="width:100%">`;
        }
    }

    function drawCard() { if(deck.length > 0) { hand.push(deck.pop()); updateUI(); } }
    function nextTurn() { turn++; document.getElementById('turn-display').innerText = `Turno ${turn}`; document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped')); drawCard(); }
    function toggleTokenMenu() { const m = document.getElementById('token-menu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
    function shuffleDeck() { deck.sort(() => Math.random() - 0.5); }
    function changeLife(n) { life += n; document.getElementById('life-display').innerText = life; }
    function openScry() { if(deck.length>0) { document.getElementById('scry-overlay').style.display='flex'; document.getElementById('scry-content').innerHTML = `<img src="https://api.scryfall.com/cards/${deck[deck.length-1].scryfall_id}?format=image&version=normal" style="height:400px">`; } }
    function scryAction(p) { const c = deck.pop(); if(p==='top') deck.push(c); else deck.unshift(c); document.getElementById('scry-overlay').style.display='none'; updateUI(); }

    window.onload = init;
</script>
</body>
</html>
