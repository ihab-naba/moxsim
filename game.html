<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Goldfish V5</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #000; --panel: #0d0d0d; --gray: #888; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #arena { display: grid; grid-template-columns: 1fr 300px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 8px; }
        
        .zone { 
            background: var(--panel); border: 1px solid var(--mox-blue); border-radius: 12px; 
            position: relative; display: flex; align-items: center; padding: 25px 10px 5px; gap: 5px; flex: 1;
            min-height: 0; overflow: hidden;
        }
        .zone::before { content: attr(data-label); position: absolute; top: 5px; left: 10px; font-size: 10px; color: var(--gray); font-weight: bold; }

        /* Layout Bottom Bar 18:20 */
        #bottom-bar { display: flex; height: 180px; gap: 8px; flex-shrink: 0; }
        
        /* FIX MANO: Carte che si restringono per stare nel riquadro */
        #hand { flex: 2.5; justify-content: flex-start; overflow-x: auto; display: flex; gap: -20px; }
        #hand .card { height: 140px; width: auto; max-width: 15%; object-fit: contain; transition: 0.2s; }
        #hand .card:hover { transform: translateY(-20px) scale(1.2); z-index: 100; }

        .small-zone { flex: 0.6; justify-content: center; }

        .card { height: 130px; border-radius: 8px; cursor: pointer; flex-shrink: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        
        /* Animazione Shuffle */
        @keyframes shuffleAnim { 0% {transform: rotate(0)} 25% {transform: rotate(8deg) scale(1.1)} 75% {transform: rotate(-8deg)} 100% {transform: rotate(0)} }
        .shuffling img { animation: shuffleAnim 0.2s infinite; }

        /* Sidebar stile 18:20 */
        #sidebar { border: 1px solid var(--mox-blue); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .life { font-size: 65px; text-align: center; color: var(--mox-blue); font-weight: bold; margin: 0; }
        
        .btn { background: #9a73ef; border: none; padding: 10px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; box-shadow: 0 4px #6a49ac; }
        .btn:active { box-shadow: 0 2px #6a49ac; transform: translateY(2px); }
        .btn-red { background: #d11326; box-shadow: 0 4px #820914; }
        
        #commander-zone { margin-top: auto; height: 180px; border: 1px solid var(--mox-blue); border-radius: 12px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        #commander-zone .card { height: 160px; }

        .count { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.85); padding: 2px 8px; border-radius: 5px; font-size: 13px; color: var(--mox-blue); border: 1px solid var(--mox-blue); }
        #status-msg { font-size: 11px; color: #00ff00; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="arena">
    <div id="board">
        <div class="zone" data-label="CREATURES" id="field-creatures"></div>
        <div class="zone" data-label="OTHERS" id="field-others"></div>
        <div class="zone" data-label="LANDS" id="field-lands"></div>
        <div id="bottom-bar">
            <div class="zone" data-label="LA TUA MANO" id="hand"></div>
            <div class="zone small-zone" data-label="MAZZO" id="library"></div>
            <div class="zone small-zone" data-label="CIMITERO" id="graveyard"></div>
            <div class="zone small-zone" data-label="ESILIO" id="exile"></div>
        </div>
    </div>

    <div id="sidebar">
        <div style="text-align:right; font-size: 11px; cursor: pointer; color: var(--gray);" onclick="window.location.href='index.html'">← ESCI</div>
        <div id="status-msg"></div>
        
        <div class="life" id="life-display">40</div>
        <div style="display:flex; gap:15px; justify-content:center; margin-bottom: 10px;">
            <button class="btn" style="width:50px; border-radius: 10px;" onclick="changeLife(-1)">-</button>
            <button class="btn" style="width:50px; border-radius: 10px;" onclick="changeLife(1)">+</button>
        </div>
        
        <button class="btn">Player ▾</button>
        <button class="btn" onclick="shuffleDeck()">Shuffle</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn-red btn" style="margin-top:5px" onclick="location.reload()">Restart</button>
        
        <div id="commander-zone" data-label="COMMANDER"></div>
    </div>
</div>

<script>
    let deck = [];
    let hand = [];
    let life = 40;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        let deckUrl = urlParams.get('deck');
        if (!deckUrl) return;

        const deckId = deckUrl.match(/\/decks\/([^?\/]+)/)?.[1] || deckUrl.split('/').pop();
        
        try {
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent(`https://api.moxfield.com/v2/decks/all/${deckId}`);
            const response = await fetch(proxy + target);
            const json = await response.json();
            const data = JSON.parse(json.contents);

            document.getElementById('status-msg').innerText = "Mazzo caricato!";

            if (data.commanders) {
                const cz = document.getElementById('commander-zone');
                Object.values(data.commanders).forEach(c => {
                    cz.appendChild(createCardUI(c.card, false));
                });
            }

            deck = [];
            Object.values(data.mainboard).forEach(info => {
                for (let i = 0; i < info.quantity; i++) { deck.push(info.card); }
            });

            shuffleArray(deck);
            for(let i=0; i<7; i++) { if(deck.length > 0) hand.push(deck.pop()); }
            
            updateUI();
        } catch (err) {
            document.getElementById('status-msg').style.color = "red";
            document.getElementById('status-msg').innerText = "Errore caricamento.";
        }
    }

    function createCardUI(cardData, isHand = true) {
        const img = document.createElement('img');
        img.src = `https://api.scryfall.com/cards/${cardData.scryfall_id}?format=image&version=normal`;
        img.className = 'card';
        if (isHand) img.onclick = () => playCard(cardData);
        return img;
    }

    function playCard(cardData) {
        const idx = hand.findIndex(c => c.scryfall_id === cardData.scryfall_id);
        if (idx > -1) {
            hand.splice(idx, 1);
            const type = (cardData.type_line || "").toLowerCase();
            let zoneId = 'field-others';
            if (type.includes('land')) zoneId = 'field-lands';
            else if (type.includes('creature')) zoneId = 'field-creatures';
            document.getElementById(zoneId).appendChild(createCardUI(cardData, false));
            updateUI();
        }
    }

    function shuffleDeck() {
        const libDiv = document.getElementById('library');
        libDiv.classList.add('shuffling');
        setTimeout(() => {
            shuffleArray(deck);
            libDiv.classList.remove('shuffling');
            updateUI();
        }, 600);
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function drawCard() {
        if (deck.length > 0) {
            hand.push(deck.pop());
            updateUI();
        }
    }

    function updateUI() {
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = '';
        hand.forEach(c => handDiv.appendChild(createCardUI(c, true)));

        const libDiv = document.getElementById('library');
        libDiv.innerHTML = deck.length > 0 ? 
            `<img src="https://cards.scryfall.io/large/back.jpg" class="card"><div class="count">${deck.length}</div>` : '';
    }

    function changeLife(v) {
        life += v;
        document.getElementById('life-display').innerText = life;
    }

    window.onload = init;
</script>
</body>
</html>
