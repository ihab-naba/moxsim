<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Welcome</title>
    <style>
        :root { --bg: #050505; --accent: #007bff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* SFONDO DINAMICO */
        .hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); opacity: 0.8; }

        .container { width: 900px; padding: 40px; text-align: center; background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        h1 { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; background: linear-gradient(to right, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #888; margin-bottom: 30px; }

        /* INPUT AREA */
        .input-group { display: flex; gap: 10px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; border: 1px solid #333; margin-bottom: 40px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 16px; outline: none; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 123, 255, 0.4); }

        /* DECK LIBRARY */
        .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; text-align: left; }
        .deck-card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; position: relative; }
        .deck-card:hover { border-color: var(--accent); background: #151515; }
        .deck-card h3 { margin: 0 0 5px 0; font-size: 14px; }
        .deck-card span { font-size: 12px; color: #555; }
        .delete-btn { position: absolute; top: 10px; right: 10px; color: #ff4757; font-size: 12px; opacity: 0; }
        .deck-card:hover .delete-btn { opacity: 1; }

        /* LOGIN OVERLAY (Semplice per ora) */
        .user-nav { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; font-size: 14px; color: #888; }
        .user-nav b { color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div class="user-nav">
        Hai già un account? <b onclick="alert('Sistema di registrazione in arrivo!')">Accedi Gratis</b>
    </div>

    <div class="container">
        <h1>MOXSIM ARENA</h1>
        <p>Incolla il link del tuo mazzo Moxfield per iniziare la simulazione.</p>

        <div class="input-group">
            <input type="text" id="deckUrl" placeholder="https://www.moxfield.com/decks/...">
            <input type="text" id="deckName" placeholder="Nome Mazzo (Opzionale)" style="flex: 0.4; border-left: 1px solid #333;">
            <button class="btn-main" onclick="saveDeck()">SALVA E GIOCA</button>
        </div>

        <div style="text-align: left; margin-bottom: 15px;">
            <h2 style="font-size: 18px;">I tuoi mazzi salvati</h2>
        </div>
        
        <div class="deck-grid" id="deckLibrary">
            </div>
    </div>

<script>
    // Carica i mazzi dal salvataggio locale all'avvio
    window.onload = displayDecks;

    function saveDeck() {
        const url = document.getElementById('deckUrl').value;
        const name = document.getElementById('deckName').value || "Mazzo senza nome";
        
        if (!url.includes("moxfield.com")) {
            alert("Per favore, inserisci un link valido di Moxfield.");
            return;
        }

        const newDeck = { id: Date.now(), name, url };
        let decks = JSON.parse(localStorage.getItem('moxDecks') || '[]');
        decks.push(newDeck);
        localStorage.setItem('moxDecks', JSON.stringify(decks));
        
        // Pulizia input e aggiornamento lista
        document.getElementById('deckUrl').value = '';
        document.getElementById('deckName').value = '';
        displayDecks();
        
        // Qui potresti reindirizzare alla pagina di gioco:
        // window.location.href = `game.html?deck=${encodeURIComponent(url)}`;
    }

    function displayDecks() {
        const container = document.getElementById('deckLibrary');
        const decks = JSON.parse(localStorage.getItem('moxDecks') || '[]');
        
        container.innerHTML = decks.length ? '' : '<p style="grid-column: span 3; color: #444;">Nessun mazzo salvato. Comincia ora!</p>';
        
        decks.forEach(deck => {
            const div = document.createElement('div');
            div.className = 'deck-card';
            div.onclick = () => window.location.href = `game.html?deck=${encodeURIComponent(deck.url)}`;
            div.innerHTML = `
                <div class="delete-btn" onclick="event.stopPropagation(); deleteDeck(${deck.id})">Rimuovi</div>
                <h3>${deck.name}</h3>
                <span>Moxfield Deck</span>
            `;
            container.appendChild(div);
        });
    }

    function deleteDeck(id) {
        let decks = JSON.parse(localStorage.getItem('moxDecks') || '[]');
        decks = decks.filter(d => d.id !== id);
        localStorage.setItem('moxDecks', JSON.stringify(decks));
        displayDecks();
    }
</script>
</body>
</html>
