<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - Dynamic Layout</title>
    <style>
        :root { --bg: #0b1014; --accent: #00a2ff; --cpu: #ff4757; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        #game-board { height: 100vh; width: 100%; display: flex; flex-direction: column; }
        
        /* Aree Giocatore/CPU */
        .player-section { flex: 1; display: flex; flex-direction: column; position: relative; border: 1px solid #1a1a1a; }
        
        /* IL SEGRETO DI ARENA: Il Battlefield Diviso */
        .battlefield-grid { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 10px;
            padding: 20px;
        }

        /* Righe magnetiche per le carte */
        .card-row { 
            display: flex; 
            justify-content: center; 
            gap: 5px; 
            min-height: 100px; 
            width: 90%; 
            border-radius: 10px;
            transition: background 0.3s;
        }
        .card-row:empty::after { content: 'Trascina qui le carte'; color: rgba(255,255,255,0.05); font-size: 12px; margin-top: 40px; }

        /* Carte piccole e intelligenti */
        .card-wrapper { 
            width: 70px; /* Più piccole di base */
            aspect-ratio: 2.5/3.5;
            transition: all 0.2s ease;
            cursor: grab;
            position: relative !important; /* Non più absolute selvaggio */
        }
        
        /* Zoom potente al passaggio */
        .card-wrapper:hover { 
            transform: scale(3.5) translateY(-20%); 
            z-index: 9999 !important; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .card-img { width: 100%; border-radius: 4px; pointer-events: none; }

        /* Zone Fisse (Library, Grave, etc) - Più piccole ai bordi */
        .side-zones { position: absolute; display: flex; flex-direction: column; gap: 10px; padding: 10px; z-index: 10; }
        .left { left: 0; top: 0; bottom: 0; justify-content: center; }
        .right { right: 0; top: 0; bottom: 0; justify-content: center; }

        .zone-slot { width: 60px; height: 85px; border: 1px solid #333; background: rgba(0,0,0,0.5); border-radius: 4px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #555; }
        .count-tag { position: absolute; bottom: -5px; background: var(--accent); color: white; padding: 1px 4px; border-radius: 3px; font-size: 10px; font-weight: bold; }

        /* HUD */
        #hud { position: absolute; right: 80px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; }
        .life-box { background: #151a1e; border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; min-width: 60px; }
        
        /* Mano */
        #p-hand { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: -30px; z-index: 1000; }
        #p-hand .card-wrapper { margin-left: -35px; }
    </style>
</head>
<body>

<div id="game-board">
    <div class="player-section" id="cpu-side">
        <div class="side-zones left">
            <div class="zone-slot">Exile</div>
            <div class="zone-slot">Grave</div>
        </div>
        <div class="battlefield-grid">
            <div class="card-row" id="cpu-row-1"></div> <div class="card-row" id="cpu-row-2"></div> </div>
        <div class="side-zones right">
            <div class="zone-slot" id="cpu-lib">Lib <span class="count-tag">99</span></div>
            <div class="zone-slot">Cmd</div>
        </div>
    </div>

    <div class="player-section" id="player-side">
        <div class="side-zones left">
            <div class="zone-slot">Cmd</div>
            <div class="zone-slot" id="player-lib" onclick="draw()">Lib <span class="count-tag">99</span></div>
        </div>
        <div class="battlefield-grid">
            <div class="card-row" id="player-row-1"></div> <div class="card-row" id="player-row-2"></div> </div>
        <div class="side-zones right">
            <div class="zone-slot">Grave</div>
            <div class="zone-slot">Exile</div>
        </div>
    </div>
</div>

<div id="p-hand"></div>

<div id="hud">
    <div class="life-box" style="color:var(--cpu)">40</div>
    <div class="life-box" style="color:var(--accent)">40</div>
    <button onclick="runAI()" style="background:#2ecc71; border:none; border-radius:4px; padding:10px; cursor:pointer; font-weight:bold;">AI</button>
</div>

<script>
    // Logica di base per far funzionare il tutto
    let deck = [];

    async function init() {
        // Carichiamo un mazzo di test se non c'è URL
        const resp = await fetch(`https://api.scryfall.com/cards/search?q=t%3Acreature`);
        const data = await resp.json();
        deck = data.data.map(c => c.name);
        for(let i=0; i<7; i++) draw();
    }

    function draw() {
        if(deck.length === 0) return;
        const name = deck.pop();
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.draggable = true;
        wrapper.innerHTML = `<img src="https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image" class="card-img">`;
        
        // Sistema di Drag & Drop moderno
        wrapper.ondragstart = (e) => { e.dataTransfer.setData("text", name); wrapper.style.opacity = "0.4"; };
        wrapper.ondragend = () => { wrapper.style.opacity = "1"; };
        
        document.getElementById('p-hand').appendChild(wrapper);
    }

    // Gestione delle righe magnetiche
    document.querySelectorAll('.card-row').forEach(row => {
        row.ondragover = (e) => e.preventDefault();
        row.ondrop = (e) => {
            e.preventDefault();
            const name = e.dataTransfer.getData("text");
            // Trova la carta che stiamo trascinando (semplificato)
            const dragged = document.querySelector('.card-wrapper[style*="opacity: 0.4"]');
            if(dragged) row.appendChild(dragged);
        };
    });

    init();
</script>
</body>
</html>
