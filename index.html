<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoxSim Arena - Battle Mirror Pro</title>
    <style>
        :root { --bg: #0b1014; --accent: #00a2ff; --cpu: #ff4757; --panel: rgba(15, 20, 25, 0.98); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* Layout Mirror */
        #game-board { height: 100vh; width: 100%; display: flex; flex-direction: column; position: relative; }
        .player-area { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: space-between; }
        #cpu-area { border-bottom: 2px solid #333; }

        /* Zone più piccole e curate */
        .zones-row { display: flex; justify-content: space-between; padding: 5px 20px; height: 100px; align-items: center; }
        .zone-box { width: 70px; height: 95px; border: 1px solid #444; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; position: relative; background: rgba(0,0,0,0.4); }
        .zone-label { position: absolute; background: #222; padding: 2px 5px; border-radius: 3px; top: -10px; font-weight: bold; font-size: 9px; border: 1px solid #444; }
        
        /* Counter Library */
        .lib-count { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; font-weight: bold; color: white; text-shadow: 0 0 5px black; z-index: 2; }

        /* Carte in mano e sul campo */
        .card-wrapper { width: 80px; transition: transform 0.2s, z-index 0.2s; cursor: grab; position: absolute; }
        .card-wrapper:hover { transform: scale(2.5); z-index: 5000 !important; }
        .card-img { width: 100%; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none; }
        
        /* Mano AI (Coperte) */
        .cpu-card-back { background: url('https://gamepedia.cursecdn.com/mtgsalvation_gamepedia/f/f8/Magic_card_back.jpg'); background-size: cover; border-radius: 4px; height: 100%; width: 100%; }

        .hand-container { display: flex; justify-content: center; width: 40%; height: 100px; align-items: flex-end; }
        .hand-container .card-wrapper { position: relative; margin-left: -45px; }

        /* HUD Centrale Destra */
        #side-hud { position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: var(--panel); border: 2px solid #444; border-right: none; padding: 10px; border-radius: 10px 0 0 10px; z-index: 1000; width: 120px; }
        .hud-stat { text-align: center; margin-bottom: 15px; }
        .life-btn { background: #333; color: white; border: 1px solid #555; width: 30px; cursor: pointer; border-radius: 3px; }
        
        /* Mana Cost Comandante */
        .mana-cost { position: absolute; top: -15px; right: -5px; background: #444; color: #fff; padding: 2px 6px; border-radius: 10px; font-size: 10px; border: 1px solid gold; font-weight: bold; }

        #top-ui { position: absolute; top: 0; left: 0; width: 100%; height: 35px; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #444; }
        input { background: #111; border: 1px solid #444; color: white; font-size: 11px; padding: 4px; border-radius: 3px; flex: 1; }
    </style>
</head>
<body>

<div id="top-ui">
    <span style="color:var(--accent); font-weight:bold; font-size:12px;">MOXSIM ARENA 2.0</span>
    <input type="text" id="pDeck" placeholder="Moxfield Player URL">
    <input type="text" id="cDeck" placeholder="Moxfield AI URL">
    <button style="background:var(--accent); color:white; border:none; padding:4px 10px; border-radius:3px; cursor:pointer;" onclick="initGame()">CARICA</button>
</div>

<div id="game-board">
    <div id="cpu-area" class="player-area">
        <div class="zones-row">
            <div style="display:flex; gap:8px">
                <div id="c-exile" class="zone-box"><span class="zone-label">Exile</span></div>
                <div id="c-gy" class="zone-box"><span class="zone-label">Grave</span></div>
                <div id="c-library" class="zone-box">
                    <span class="zone-label">Library</span>
                    <div id="c-lib-count" class="lib-count">0</div>
                    <img src="https://gamepedia.cursecdn.com/mtgsalvation_gamepedia/f/f8/Magic_card_back.jpg" style="width:100%; opacity:0.3">
                </div>
            </div>
            <div id="c-hand" class="hand-container"></div>
            <div id="c-commander" class="zone-box">
                <span class="zone-label">Commander</span>
                <div id="c-mana" class="mana-cost">?</div>
            </div>
        </div>
    </div>

    <div id="user-area" class="player-area">
        <div class="zones-row" style="margin-top:auto">
            <div id="p-commander" class="zone-box">
                <span class="zone-label">Commander</span>
                <div id="p-mana" class="mana-cost">?</div>
            </div>
            <div id="p-hand" class="hand-container"></div>
            <div style="display:flex; gap:8px">
                <div id="p-library" class="zone-box" onclick="draw('p')">
                    <span class="zone-label">Library</span>
                    <div id="p-lib-count" class="lib-count">0</div>
                    <img src="https://gamepedia.cursecdn.com/mtgsalvation_gamepedia/f/f8/Magic_card_back.jpg" style="width:100%; opacity:0.3">
                </div>
                <div id="p-gy" class="zone-box"><span class="zone-label">Grave</span></div>
                <div id="p-exile" class="zone-box"><span class="zone-label">Exile</span></div>
            </div>
        </div>
    </div>

    <div id="side-hud">
        <div class="hud-stat">
            <div style="color:var(--cpu); font-size:10px; font-weight:bold">CPU LIFE</div>
            <div id="c-hp" style="font-size:24px; font-weight:bold; color:var(--cpu)">40</div>
            <button class="life-btn" onclick="upd('c-hp', 1)">+</button>
            <button class="life-btn" onclick="upd('c-hp', -1)">-</button>
        </div>
        <div class="hud-stat">
            <div style="color:var(--accent); font-size:10px; font-weight:bold">YOUR LIFE</div>
            <div id="p-hp" style="font-size:24px; font-weight:bold; color:var(--accent)">40</div>
            <button class="life-btn" onclick="upd('p-hp', 1)">+</button>
            <button class="life-btn" onclick="upd('p-hp', -1)">-</button>
        </div>
        <button style="width:100%; padding:8px; background:#2ecc71; border:none; border-radius:5px; font-weight:bold; cursor:pointer;" onclick="runAI()">AI ACTION</button>
    </div>
</div>

<script>
    let decks = { p: [], c: [] };

    async function initGame() {
        const pUrl = document.getElementById('pDeck').value;
        const cUrl = document.getElementById('cDeck').value;
        if(!pUrl || !cUrl) return alert("Inserisci i link di Moxfield!");

        const [pD, cD] = await Promise.all([fetchM(pUrl), fetchM(cUrl)]);
        
        decks.p = parse(pD); decks.c = parse(cD);
        
        document.getElementById('p-lib-count').innerText = decks.p.length;
        document.getElementById('c-lib-count').innerText = decks.c.length;

        setupCommanders(pD, cD);
        for(let i=0; i<7; i++) { draw('p'); draw('c'); }
    }

    async function fetchM(url) {
        const id = url.split('/decks/')[1]?.split('?')[0];
        return fetch(`https://corsproxy.io/?${encodeURIComponent('https://api.moxfield.com/v2/decks/all/'+id)}`).then(r => r.json());
    }

    function parse(data) {
        let d = [];
        Object.values(data.mainboard).forEach(c => { for(let i=0; i<c.quantity; i++) d.push(c.card.name); });
        return d.sort(() => Math.random() - 0.5);
    }

    function setupCommanders(pD, cD) {
        if(pD.commanders) {
            const cmd = Object.values(pD.commanders)[0];
            spawn(cmd.card.name, 'p-commander', false);
            document.getElementById('p-mana').innerText = cmd.card.mana_cost || '0';
        }
        if(cD.commanders) {
            const cmd = Object.values(cD.commanders)[0];
            spawn(cmd.card.name, 'c-commander', false);
            document.getElementById('c-mana').innerText = cmd.card.mana_cost || '0';
        }
    }

    function draw(who) {
        if(decks[who].length > 0) {
            spawn(decks[who].pop(), who + '-hand', (who === 'c'));
            document.getElementById(who + '-lib-count').innerText = decks[who].length;
        }
    }

    function spawn(name, zoneId, isHidden) {
        const card = document.createElement('div');
        card.className = 'card-wrapper';
        if(isHidden) {
            card.innerHTML = `<div class="cpu-card-back" data-name="${name}"></div>`;
        } else {
            card.innerHTML = `<img src="https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image" class="card-img">`;
        }
        
        card.onmousedown = (e) => {
            if(e.button !== 0) return;
            let sx = e.clientX - card.getBoundingClientRect().left;
            let sy = e.clientY - card.getBoundingClientRect().top;
            function move(e) {
                card.style.position = 'fixed';
                card.style.left = e.clientX - sx + 'px';
                card.style.top = e.clientY - sy + 'px';
                card.style.zIndex = 10000;
            }
            document.addEventListener('mousemove', move);
            document.onmouseup = () => {
                document.removeEventListener('mousemove', move);
                // Se la carta AI viene mossa sul campo, la scopriamo
                if(isHidden && parseInt(card.style.top) > 100) {
                    const realName = card.querySelector('.cpu-card-back').dataset.name;
                    card.innerHTML = `<img src="https://api.scryfall.com/cards/named?exact=${encodeURIComponent(realName)}&format=image" class="card-img">`;
                    isHidden = false;
                }
            };
        };

        card.ondblclick = () => card.classList.toggle('tapped');
        document.getElementById(zoneId).appendChild(card);
    }

    function upd(id, v) { 
        let el = document.getElementById(id);
        el.innerText = parseInt(el.innerText) + v;
    }

    function runAI() {
        draw('c');
        console.log("AI ha pescato una carta.");
    }
</script>
</body>
</html>
