<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena 5.0 - Final Layout</title>
    <style>
        :root { --bg: #0b1014; --accent: #00a2ff; --cpu: #ff4757; --glow: rgba(0, 162, 255, 0.7); --stack-color: #ffd700; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* UI SUPERIORE */
        #top-ui { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.95); display: flex; align-items: center; padding: 0 15px; gap: 10px; z-index: 5000; border-bottom: 1px solid #333; transition: transform 0.4s; }
        #top-ui.hidden { transform: translateY(-100%); }
        input { background: #111; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; flex: 1; font-size: 13px; }
        .load-btn { background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #settings-btn { position: fixed; top: 10px; right: 10px; z-index: 5001; background: #222; border: 1px solid #444; color: white; padding: 5px 12px; border-radius: 5px; cursor: pointer; display: none; }

        /* GRIGLIA PRINCIPALE */
        #game-board { height: 100vh; width: 100%; display: grid; grid-template-columns: 120px 1fr 180px; gap: 0; }

        /* ZONE LATERALI (Left & Right) */
        .side-column { display: flex; flex-direction: column; justify-content: space-between; padding: 15px 0; align-items: center; background: rgba(0,0,0,0.2); }
        .zone-group { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        
        .zone-slot { 
            width: 85px; height: 118px; border: 1.5px solid #2a2a2a; 
            background: rgba(255,255,255,0.02); border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; position: relative; 
        }
        .zone-label { position: absolute; width: 100%; text-align: center; color: #555; font-size: 8px; font-weight: bold; pointer-events: none; text-transform: uppercase; bottom: 5px; }

        /* LIFE COUNTERS (Sopra le zone chiave) */
        .life-wrap { margin-bottom: 5px; text-align: center; }
        .life-display { background: #111; border: 1px solid #333; padding: 4px 12px; border-radius: 6px; font-weight: bold; font-size: 18px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* CAMPO DI BATTAGLIA (Centro) */
        #battlefield { display: flex; flex-direction: column; position: relative; border-left: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a; }
        .player-field { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .card-row { display: flex; justify-content: center; align-items: center; width: 90%; min-height: 120px; gap: 10px; border: 1px dashed rgba(255,255,255,0.03); border-radius: 10px; }

        /* STACK (Spostato a destra ma integrato) */
        #the-stack { 
            width: 90px; height: 125px; border: 2px solid var(--stack-color); border-radius: 8px;
            background: rgba(255, 215, 0, 0.05); display: flex; align-items: center; justify-content: center;
            position: relative; margin: 20px 0;
        }
        #the-stack::before { content: 'STACK'; position: absolute; top: -18px; font-size: 10px; color: var(--stack-color); font-weight: bold; }

        /* CARTE */
        .card-wrapper { width: 80px; aspect-ratio: 2.5/3.5; position: relative; transition: all 0.2s; cursor: grab; z-index: 10; }
        .playable { box-shadow: 0 0 12px 2px var(--glow); border-radius: 6px; }
        .card-wrapper:hover { transform: scale(3.5); z-index: 9000 !important; }
        .card-img { width: 100%; height: 100%; border-radius: 6px; pointer-events: none; }
        .tapped { transform: rotate(90deg) !important; }

        /* PULSANTI E MANO */
        .bottom-ui { position: fixed; bottom: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; z-index: 6000; }
        .btn-game { pointer-events: auto; padding: 12px 25px; border-radius: 30px; border: none; font-weight: bold; color: white; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        #draw-btn { background: #0072ff; }
        #phase-btn { background: #222; border: 1px solid #444; min-width: 200px; }
        #ai-btn { background: var(--cpu); padding: 8px 15px; border-radius: 5px; margin-top: 10px; }

        #p-hand { position: fixed; bottom: -35px; left: 50%; transform: translateX(-50%); display: flex; justify-content: center; width: 60%; height: 160px; transition: bottom 0.3s; z-index: 4000; }
        #p-hand:hover { bottom: 25px; }
        #p-hand .card-wrapper { margin-left: -35px; }
    </style>
</head>
<body>

<div id="top-ui">
    <input type="text" id="pUrl" placeholder="Player Deck URL">
    <input type="text" id="cUrl" placeholder="AI Deck URL">
    <button class="load-btn" onclick="loadBattle()">START BATTLE</button>
</div>

<button id="settings-btn" onclick="toggleSettings()">⚙️ DECK</button>

<div id="game-board">
    <div class="side-column">
        <div class="zone-group">
            <div class="zone-slot"><span class="zone-label">Exile</span></div>
            <div class="zone-slot"><span class="zone-label">Graveyard</span></div>
        </div>
        <div class="zone-group">
            <div class="zone-slot" id="p-cmd-zone"><span class="zone-label">Commander</span></div>
            <div class="zone-slot">
                <div style="width:100%;height:100%;background:url('https://gamepedia.cursecdn.com/mtgsalvation_gamepedia/f/f8/Magic_card_back.jpg') center/cover;border-radius:5px;opacity:0.6;"></div>
                <div id="p-count" style="position:absolute;font-weight:bold;font-size:20px;">0</div>
            </div>
        </div>
    </div>

    <div id="battlefield">
        <div class="player-field" id="cpu-field">
            <div class="card-row" id="c-row-lands"></div>
            <div class="card-row" id="c-row-creatures"></div>
        </div>
        <div style="height:1px; background:rgba(255,255,255,0.1); width:100%;"></div>
        <div class="player-field" id="user-field">
            <div class="card-row" id="p-row-creatures"></div>
            <div class="card-row" id="p-row-lands"></div>
        </div>
    </div>

    <div class="side-column">
        <div class="zone-group">
            <div class="life-wrap"><div class="life-display" style="color:var(--cpu)">40</div></div>
            <div class="zone-slot">
                <div style="width:100%;height:100%;background:url('https://gamepedia.cursecdn.com/mtgsalvation_gamepedia/f/f8/Magic_card_back.jpg') center/cover;border-radius:5px;opacity:0.6;"></div>
                <div id="c-count" style="position:absolute;font-weight:bold;font-size:20px;">0</div>
            </div>
            <div class="zone-slot" id="c-cmd-zone"><span class="zone-label">Commander</span></div>
        </div>

        <div id="the-stack"></div>

        <div class="zone-group">
            <button id="ai-btn" class="btn-game" onclick="aiAction()">AI ACTION</button>
            <div class="zone-slot"><span class="zone-label">Graveyard</span></div>
            <div class="zone-slot"><span class="zone-label">Exile</span></div>
            <div class="life-wrap"><div class="life-display" style="color:var(--accent)">40</div></div>
        </div>
    </div>
</div>

<div id="p-hand"></div>

<div class="bottom-ui">
    <button id="draw-btn" class="btn-game" onclick="draw('p')">DRAW</button>
    <button id="phase-btn" class="btn-game" onclick="nextPhase()">FASE: Iniziale</button>
</div>

<script>
    let decks = { p: [], c: [] };
    const phases = ["Fase Iniziale", "Sottofase di STAP", "Mantenimento", "Acquisizione", "Principale 1", "Inizio Combattimento", "Attaccanti", "Bloccanti", "Danno", "Fine Combattimento", "Principale 2", "Fase Finale", "Sottofase Finale"];
    let phaseIdx = 0;

    function toggleSettings() { document.getElementById('top-ui').classList.toggle('hidden'); }

    async function loadBattle() {
        resetGame();
        const pUrl = document.getElementById('pUrl').value;
        const cUrl = document.getElementById('cUrl').value;
        const [pD, cD] = await Promise.all([fetchM(pUrl), fetchM(cUrl)]);
        decks.p = parse(pD); decks.c = parse(cD);
        document.getElementById('top-ui').classList.add('hidden');
        document.getElementById('settings-btn').style.display = 'block';
        if(pD.commanders) spawn(Object.values(pD.commanders)[0].card.name, 'p-cmd-zone');
        if(cD.commanders) spawn(Object.values(cD.commanders)[0].card.name, 'c-cmd-zone');
        for(let i=0; i<7; i++) draw('p');
        updateUI();
    }

    function resetGame() {
        document.getElementById('p-hand').innerHTML = '';
        document.querySelectorAll('.card-row').forEach(r => r.innerHTML = '');
        phaseIdx = 0; document.getElementById('phase-btn').innerText = "FASE: Iniziale";
    }

    async function fetchM(url) {
        const id = url.split('/decks/')[1]?.split('?')[0];
        return fetch(`https://corsproxy.io/?${encodeURIComponent('https://api.moxfield.com/v2/decks/all/'+id)}`).then(r => r.json());
    }

    function parse(data) {
        let l = [];
        Object.values(data.mainboard).forEach(c => { for(let i=0; i<c.quantity; i++) l.push(c.card.name); });
        return l.sort(() => Math.random() - 0.5);
    }

    function draw(who) {
        if(decks[who].length > 0) {
            const c = spawn(decks[who].pop(), who === 'p' ? 'p-hand' : 'c-row-creatures');
            if(who === 'p') c.classList.add('playable');
            updateUI();
        }
    }

    function spawn(name, zoneId) {
        const w = document.createElement('div');
        w.className = 'card-wrapper';
        w.draggable = true;
        w.innerHTML = `<img src="https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image" class="card-img">`;
        w.ondblclick = () => w.classList.toggle('tapped');
        w.ondragstart = (e) => w.classList.add('dragging');
        w.ondragend = () => w.classList.remove('dragging');
        document.getElementById(zoneId).appendChild(w);
        return w;
    }

    function updateUI() {
        document.getElementById('p-count').innerText = decks.p.length;
        document.getElementById('c-count').innerText = decks.c.length;
    }

    function nextPhase() {
        phaseIdx = (phaseIdx + 1) % phases.length;
        document.getElementById('phase-btn').innerText = "FASE: " + phases[phaseIdx];
    }

    function aiAction() {
        if(decks.c.length === 0) return;
        const name = decks.c.pop();
        const card = spawn(name, 'the-stack');
        setTimeout(() => {
            const isL = name.toLowerCase().includes("land") || name.toLowerCase().includes("island");
            document.getElementById(isL ? 'c-row-lands' : 'c-row-creatures').appendChild(card);
            updateUI();
        }, 1200);
    }

    document.querySelectorAll('.card-row, .zone-slot, #p-hand, #the-stack').forEach(z => {
        z.ondragover = (e) => e.preventDefault();
        z.ondrop = (e) => {
            const d = document.querySelector('.dragging');
            if(d) z.appendChild(d);
        };
    });
</script>
</body>
</html>
