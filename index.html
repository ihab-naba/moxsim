<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Mirror - Precision Layout</title>
    <style>
        :root { --bg: #0d0d0d; --border: #1a1a1a; --text: #888; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: sans-serif; overflow: hidden; color: white; }

        /* Struttura Principale */
        #app { display: grid; grid-template-columns: 1fr 300px; height: 100vh; }

        /* Tavolo da gioco */
        #board { display: grid; grid-template-rows: 1fr 1fr; border-right: 2px solid #222; }

        /* Griglia Player (Basata su ugviy.png) */
        .player-grid { 
            display: grid; 
            grid-template-areas: 
                "others creatures"
                "hand lands";
            grid-template-columns: 1fr 2fr; /* Others e Hand sono più stretti */
            grid-template-rows: 2fr 1fr;    /* Creature e Others occupano più spazio verticale */
            gap: 2px; background: #222; /* Crea l'effetto linee di divisione */
        }

        /* Griglia CPU (Specchiata invertendo le aree) */
        .cpu-grid { 
            display: grid; 
            grid-template-areas: 
                "lands hand"
                "creatures others";
            grid-template-columns: 2fr 1fr; 
            grid-template-rows: 1fr 2fr;
            gap: 2px; background: #222;
        }

        .zone { background: var(--bg); position: relative; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
        .zone::after { content: attr(data-label); position: absolute; top: 10px; left: 10px; font-size: 12px; color: #333; text-transform: uppercase; font-weight: bold; pointer-events: none; }

        /* Mapping Aree */
        .z-others { grid-area: others; }
        .z-creatures { grid-area: creatures; }
        .z-hand { grid-area: hand; border: 1px solid #1a1a1a; background: #050505; }
        .z-lands { grid-area: lands; }

        /* Sidebar */
        .sidebar { background: #111; display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        .stat-card { background: #000; border: 1px solid #222; padding: 15px; text-align: center; border-radius: 4px; }
        .life { font-size: 28px; font-weight: bold; margin: 10px 0; }
        
        .zone-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .mini-slot { height: 80px; border: 1px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; }
        .mini-slot b { color: #fff; font-size: 16px; }

        /* Carte */
        .card { width: 80px; aspect-ratio: 2.5/3.5; border-radius: 4px; cursor: grab; transition: transform 0.2s; position: relative; }
        .card img { width: 100%; height: 100%; border-radius: 4px; pointer-events: none; }
        .card:hover { transform: scale(3); z-index: 1000; box-shadow: 0 0 20px #000; }
        .tapped { transform: rotate(90deg); }

        /* Input Bar */
        #controls { background: #000; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #222; }
        input { background: #111; border: 1px solid #333; color: white; padding: 5px; flex: 1; border-radius: 3px; }
        button { background: #3498db; border: none; color: white; padding: 5px 15px; cursor: pointer; font-weight: bold; border-radius: 3px; }

        .btn-ai { background: #e74c3c; width: 100%; padding: 10px; margin-top: 5px; font-weight: bold; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="controls">
    <input type="text" id="pUrl" placeholder="Player Moxfield URL">
    <input type="text" id="cUrl" placeholder="AI Moxfield URL">
    <button onclick="setupGame()">CARICA BATTAGLIA</button>
</div>

<div id="app">
    <div id="board">
        <div class="cpu-grid">
            <div class="zone z-lands" id="c-lands" data-label="Lands (CPU)"></div>
            <div class="zone z-hand" id="c-hand" data-label="Hand (CPU)"></div>
            <div class="zone z-creatures" id="c-creatures" data-label="Creatures (CPU)"></div>
            <div class="zone z-others" id="c-others" data-label="Non-Creatures (CPU)"></div>
        </div>

        <div class="player-grid">
            <div class="zone z-others" id="p-others" data-label="Artefacts / Enchantments"></div>
            <div class="zone z-creatures" id="p-creatures" data-label="Creatures"></div>
            <div class="zone z-hand" id="p-hand" data-label="Hand"></div>
            <div class="zone z-lands" id="p-lands" data-label="Lands"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="zone-stack">
            <div class="mini-slot">LIB<br><b id="c-lib">0</b></div>
            <div class="mini-slot" id="c-cmd-slot">CMD</div>
        </div>
        <div class="stat-card">
            <div style="color:#e74c3c">CPU LIFE</div>
            <div class="life" style="color:#e74c3c">40</div>
            <button class="btn-ai" onclick="aiMove()">AI MOVE</button>
        </div>
        <div class="zone-stack">
            <div class="mini-slot">GRAVE</div>
            <div class="mini-slot">EXILE</div>
        </div>

        <div style="flex-grow: 1"></div>

        <div class="zone-stack">
            <div class="mini-slot">EXILE</div>
            <div class="mini-slot">GRAVE</div>
        </div>
        <div class="stat-card">
            <div style="color:#3498db">YOUR LIFE</div>
            <div class="life" style="color:#3498db">40</div>
            <button class="btn-ai" style="background:#e67e22" onclick="draw('p')">DRAW CARD</button>
        </div>
        <div class="zone-stack">
            <div class="mini-slot" id="p-cmd-slot">CMD</div>
            <div class="mini-slot" style="border-color:#3498db">LIB<br><b id="p-lib">0</b></div>
        </div>
        <button class="btn-ai" style="background:#3498db; border-radius: 20px" id="phase-btn" onclick="nextPhase()">FASE: Iniziale</button>
    </div>
</div>

<script>
    let decks = { p: [], c: [] };
    const phaseList = ["Iniziale", "STAP", "Mantenimento", "Acquisizione", "Main 1", "Attacco", "Blocco", "Danno", "Main 2", "Finale"];
    let currentPhase = 0;

    async function setupGame() {
        // RESET TOTALE
        document.querySelectorAll('.zone, .mini-slot').forEach(z => {
            if(!z.id.includes('lib')) z.innerHTML = '';
        });
        
        const pData = await fetchDeck(document.getElementById('pUrl').value);
        const cData = await fetchDeck(document.getElementById('cUrl').value);
        
        decks.p = pData.main; decks.c = cData.main;
        
        if(pData.cmdr) spawnCard(pData.cmdr, 'p-cmd-slot');
        if(cData.cmdr) spawnCard(cData.cmdr, 'c-cmd-slot');

        for(let i=0; i<7; i++) draw('p');
        updateCounters();
    }

    async function fetchDeck(url) {
        const id = url.split('/decks/')[1]?.split('?')[0];
        const r = await fetch(`https://corsproxy.io/?${encodeURIComponent('https://api.moxfield.com/v2/decks/all/'+id)}`).then(res => res.json());
        let main = [];
        Object.values(r.mainboard).forEach(c => { for(let i=0; i<c.quantity; i++) main.push(c.card.name); });
        return { main: main.sort(() => Math.random() - 0.5), cmdr: r.commanders ? Object.values(r.commanders)[0].card.name : null };
    }

    function spawnCard(name, zoneId) {
        const card = document.createElement('div');
        card.className = 'card';
        card.draggable = true;
        card.innerHTML = `<img src="https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image">`;
        card.ondblclick = () => card.classList.toggle('tapped');
        card.ondragstart = (e) => { card.id = "dt-" + Date.now(); e.dataTransfer.setData("text", card.id); };
        document.getElementById(zoneId).appendChild(card);
    }

    function draw(who) {
        if(decks[who].length > 0) {
            spawnCard(decks[who].pop(), who === 'p' ? 'p-hand' : 'c-creatures');
            updateCounters();
        }
    }

    function aiMove() {
        if(decks.c.length > 0) {
            const name = decks.c.pop();
            const isLand = name.toLowerCase().includes("land") || name.toLowerCase().includes("swamp") || name.toLowerCase().includes("island");
            spawnCard(name, isLand ? 'c-lands' : 'c-creatures');
            updateCounters();
        }
    }

    function nextPhase() {
        currentPhase = (currentPhase + 1) % phaseList.length;
        document.getElementById('phase-btn').innerText = "FASE: " + phaseList[currentPhase];
    }

    function updateCounters() {
        document.getElementById('p-lib').innerText = decks.p.length;
        document.getElementById('c-lib').innerText = decks.c.length;
    }

    // Drag & Drop
    document.querySelectorAll('.zone, .mini-slot').forEach(z => {
        z.ondragover = e => e.preventDefault();
        z.ondrop = e => {
            const id = e.dataTransfer.getData("text");
            const el = document.getElementById(id);
            if(el) z.appendChild(el);
        };
    });
</script>
</body>
</html>
