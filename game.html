<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Arena - V24 (Fast & Fixed)</title>
    <style>
        :root { --mox-blue: #007bff; --bg: #0b0b0b; --panel: #161616; --valid: #2ecc71; --invalid: #e74c3c; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #arena { display: grid; grid-template-columns: 1fr 280px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        #board { display: flex; flex-direction: column; gap: 10px; }
        
        /* Navigazione */
        #top-nav { position: absolute; top: 10px; right: 290px; z-index: 100; }
        .btn-exit { background: #444; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 12px; }

        .zone { background: var(--panel); border: 1px solid #282828; border-radius: 8px; position: relative; display: flex; align-items: center; padding: 35px 15px 15px; gap: 10px; flex: 1; min-height: 0; overflow-x: auto; }
        .zone::before { content: attr(data-label); position: absolute; top: 8px; left: 12px; font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase; }
        .zone.drag-over { border-color: var(--mox-blue); background: #222; }

        #bottom-bar { display: flex; height: 190px; gap: 10px; flex-shrink: 0; }
        #hand { flex: 2.5; justify-content: center; overflow: visible !important; }

        /* CARDS */
        .card { height: 140px; border-radius: 8px; cursor: grab; flex-shrink: 0; transition: transform 0.2s; border: 3px solid transparent; box-sizing: border-box; background: #000; }
        .hand-card { margin-right: -30px; opacity: 1 !important; } /* Meno sovrapposizione */
        .hand-card:hover { transform: translateY(-80px) scale(2); z-index: 1000 !important; margin: 0 40px; }
        
        .can-cast { border-color: var(--valid) !important; box-shadow: 0 0 10px var(--valid); }
        .cant-cast { border-color: var(--invalid) !important; }
        .tapped { transform: rotate(90deg); margin: 0 35px; filter: brightness(0.6); }

        #sidebar { border-left: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0c0c0c; }
        .life { font-size: 60px; text-align: center; font-weight: bold; margin: 10px 0; }
        .btn { background: #2a2a2a; border: none; padding: 12px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-blue { background: var(--mox-blue); }

        .pile-zone { flex: 0.6; display: flex; flex-direction: column; align-items: center; }
        .pile-visual { width: 90px; height: 125px; border-radius: 8px; border: 2px dashed #333; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; background: #000; }
        .pile-visual img { width: 100%; border-radius: 6px; }
        .sleeve { background: #1abc9c; border: 2px solid white; border-style: solid !important; }

        #commander-zone { height: 150px; border: 1px solid #333; border-radius: 8px; display: flex; justify-content: center; align-items: center; margin-top: auto; background: #111; }
    </style>
</head>
<body>

<div id="top-nav">
    <button class="btn-exit" onclick="window.location.href='index.html'">← ESCI / HOME</button>
</div>

<div id="arena">
    <div id="board">
        <div class="zone" data-label="Creatures" id="field-creatures" ondragover="allowDrop(event)" ondrop="drop(event)" ondragleave="dragLeave(event)"></div>
        <div class="zone" data-label="Non-Creatures" id="field-others" ondragover="allowDrop(event)" ondrop="drop(event)" ondragleave="dragLeave(event)"></div>
        <div class="zone" data-label="Lands" id="field-lands" ondragover="allowDrop(event)" ondrop="drop(event)" ondragleave="dragLeave(event)"></div>
        
        <div id="bottom-bar">
            <div class="zone" data-label="Hand" id="hand" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
            <div class="pile-zone">
                <span style="font-size:10px">Library (<span id="c-lib">0</span>)</span>
                <div class="pile-visual sleeve" onclick="drawCard()"></div>
            </div>
            <div class="pile-zone">
                <span style="font-size:10px">Graveyard (<span id="c-grave">0</span>)</span>
                <div class="pile-visual" id="p-grave" ondragover="allowDrop(event)" ondrop="drop(event)" data-dest="grave"></div>
            </div>
            <div class="pile-zone">
                <span style="font-size:10px">Exile (<span id="c-exile">0</span>)</span>
                <div class="pile-visual" id="p-exile" ondragover="allowDrop(event)" ondrop="drop(event)" data-dest="exile"></div>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="life" id="life-display">40</div>
        <div style="display:flex; gap:5px;"><button class="btn" style="flex:1" onclick="changeLife(-1)">-</button><button class="btn" style="flex:1" onclick="changeLife(1)">+</button></div>
        <button class="btn btn-blue" onclick="nextTurn()">Next Turn</button>
        <button class="btn" onclick="untapAll()">Untap All</button>
        <button class="btn" onclick="drawCard()">Draw</button>
        <button class="btn" style="background:#a82331" onclick="location.reload()">Reset Arena</button>
        <div id="commander-zone" ondragover="allowDrop(event)" ondrop="drop(event)" data-dest="commander"></div>
    </div>
</div>

<script>
    let deck = [], hand = [], grave = [], exile = [], life = 40;
    let draggedData = null;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const deckId = (urlParams.get('deck') || "").split('/').pop();
        if(!deckId) return;

        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.moxfield.com/v2/decks/all/'+deckId)}`);
            const json = await res.json();
            const data = JSON.parse(json.contents);

            if(data.commanders) Object.values(data.commanders).forEach(c => document.getElementById('commander-zone').appendChild(createCardUI(c.card, 'commander')));
            
            deck = [];
            Object.values(data.mainboard).forEach(info => {
                for(let i=0; i<info.quantity; i++) deck.push(info.card);
            });

            shuffle(deck);
            for(let i=0; i<7; i++) if(deck.length) hand.push(deck.pop());
            updateUI();
        } catch(e) { alert("Errore caricamento."); }
    }

    function getManaResources() {
        let pool = { total: 0, colors: [] };
        document.querySelectorAll('#field-lands .card:not(.tapped)').forEach(land => {
            pool.total++;
            const data = JSON.parse(land.dataset.info);
            // Semplice check colori basato sulla card face
            if(data.mana_cost) pool.colors.push(data.mana_cost); 
        });
        return pool;
    }

    function createCardUI(card, loc) {
        const img = document.createElement('img');
        img.src = `https://api.scryfall.com/cards/${card.scryfall_id}?format=image&version=normal`;
        img.className = 'card ' + (loc === 'hand' ? 'hand-card' : '');
        img.dataset.info = JSON.stringify(card);
        img.draggable = true;

        img.onclick = () => {
            const p = img.parentElement.id;
            if(p === 'hand' || p === 'commander-zone') {
                playCard(card, p);
            } else {
                img.classList.toggle('tapped');
                updateHighlights();
            }
        };

        img.ondragstart = (e) => { draggedData = card; e.dataTransfer.setData("text", card.scryfall_id); };
        return img;
    }

    function updateHighlights() {
        const pool = getManaResources();
        document.querySelectorAll('#hand .card').forEach(img => {
            const data = JSON.parse(img.dataset.info);
            if(data.type_line.includes('Land')) return;
            
            const cost = (data.mana_cost || "").match(/\{.+?\}/g) || [];
            if(pool.total >= cost.length) img.className = 'card hand-card can-cast';
            else img.className = 'card hand-card cant-cast';
        });
    }

    function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    
    function drop(e) {
        e.preventDefault();
        const zone = e.currentTarget;
        zone.classList.remove('drag-over');
        if(!draggedData) return;

        // Rimuovi da ovunque sia
        removeFromLogic(draggedData);
        
        const dest = zone.dataset.dest || zone.id;
        if(dest === 'grave') { grave.push(draggedData); }
        else if(dest === 'exile') { exile.push(draggedData); }
        else if(dest === 'hand') { hand.push(draggedData); }
        else if(dest === 'commander') { zone.appendChild(createCardUI(draggedData, 'commander')); }
        else { zone.appendChild(createCardUI(draggedData, 'field')); }
        
        updateUI();
    }

    function removeFromLogic(card) {
        hand = hand.filter(c => c.scryfall_id !== card.scryfall_id);
        document.querySelectorAll('.card').forEach(c => {
            const info = JSON.parse(c.dataset.info);
            if(info.scryfall_id === card.scryfall_id && c.parentElement.id !== 'hand') c.remove();
        });
    }

    function playCard(card, from) {
        removeFromLogic(card);
        const type = card.type_line.toLowerCase();
        let zId = type.includes('land') ? 'field-lands' : (type.includes('creature') ? 'field-creatures' : 'field-others');
        document.getElementById(zId).appendChild(createCardUI(card, 'field'));
        updateUI();
    }

    function updateUI() {
        const h = document.getElementById('hand'); h.innerHTML = '';
        hand.forEach(c => h.appendChild(createCardUI(c, 'hand')));
        
        document.getElementById('c-lib').innerText = deck.length;
        document.getElementById('c-grave').innerText = grave.length;
        document.getElementById('c-exile').innerText = exile.length;
        
        if(grave.length) document.getElementById('p-grave').innerHTML = `<img src="https://api.scryfall.com/cards/${grave[grave.length-1].scryfall_id}?format=image&version=small">`;
        if(exile.length) document.getElementById('p-exile').innerHTML = `<img src="https://api.scryfall.com/cards/${exile[exile.length-1].scryfall_id}?format=image&version=small">`;
        
        updateHighlights();
    }

    function nextTurn() { untapAll(); drawCard(); }
    function untapAll() { document.querySelectorAll('.card.tapped').forEach(c => c.classList.remove('tapped')); updateHighlights(); }
    function drawCard() { if(deck.length) { hand.push(deck.pop()); updateUI(); } }
    function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
    function changeLife(v) { life+=v; document.getElementById('life-display').innerText = life; }

    window.onload = init;
</script>
</body>
</html>
