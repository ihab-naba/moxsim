<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MoxSim Pro - Mirror Battle Edition</title>
    <style>
        :root { 
            --bg: #121212; --panel: #1c1c1c; --accent: #3b82f6; 
            --cpu-red: #ef4444; --mox-orange: #e67e22; --mox-blue: #3498db;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; color: white; overflow: hidden; }

        /* HEADER */
        #top-bar { height: 45px; background: #000; display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #333; }
        input { background: #222; border: 1px solid #444; color: white; padding: 5px 10px; border-radius: 4px; flex: 1; font-size: 12px; }
        .start-btn { background: #007bff; border: none; color: white; padding: 6px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* PLAY AREA */
        #tabletop { height: calc(100vh - 45px); display: flex; flex-direction: column; }
        
        .player-area { flex: 1; display: grid; grid-template-columns: 1fr 280px; position: relative; }
        .cpu-area { border-bottom: 2px solid #333; background: rgba(255,0,0,0.02); }
        .user-area { background: rgba(0,123,255,0.02); }

        /* CARD SLOTS & FIELD */
        .field { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; gap: 15px; }
        .card-row { display: flex; gap: 12px; min-height: 140px; width: 100%; justify-content: center; }

        /* SIDEBAR CONTROLS (STILE MOXFIELD) */
        .sidebar { background: var(--panel); border-left: 1px solid #333; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .zones-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .small-slot { width: 60px; height: 84px; border: 1px solid #444; border-radius: 4px; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }
        .slot-label { position: absolute; bottom: 2px; font-size: 8px; color: #666; text-transform: uppercase; width: 100%; text-align: center; }
        
        /* LIFE & COUNTERS */
        .life-box { padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 20px; border: 1px solid #444; margin: 5px 0; }
        
        /* BUTTONS */
        .mox-btn { width: 100%; padding: 10px; border-radius: 20px; border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn-orange { background: var(--mox-orange); }
        .btn-blue { background: var(--mox-blue); margin-top: auto; }
        .btn-ai { background: var(--cpu-red); }

        /* CARTE & ZOOM */
        .card { width: 100px; aspect-ratio: 2.5/3.5; border-radius: 6px; transition: transform 0.25s ease; cursor: grab; position: relative; }
        .card:hover { transform: scale(2.5) translateY(20%); z-index: 1000; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .cpu-area .card:hover { transform: scale(2.5) translateY(-20%); } /* Zoom verso il basso per CPU */
        .card img { width: 100%; height: 100%; border-radius: 6px; }
        .tapped { transform: rotate(90deg) !important; }

        /* STACK */
        #the-stack { 
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 120px; height: 160px; border: 2px dashed #ffd700; border-radius: 10px;
            z-index: 500; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); pointer-events: none; opacity: 0; transition: 0.3s;
        }
        #the-stack.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

<div id="top-bar">
    <div style="font-weight: bold; color: var(--accent);">MOXSIM MIRROR</div>
    <input type="text" id="pUrl" placeholder="Player URL">
    <input type="text" id="cUrl" placeholder="AI URL">
    <button class="start-btn" onclick="initGame()">CARICA BATTAGLIA</button>
</div>

<div id="tabletop">
    <div class="player-area cpu-area">
        <div class="field">
            <div class="card-row" id="c-lands"></div>
            <div class="card-row" id="c-creatures"></div>
        </div>
        <div class="sidebar">
            <div class="zones-row">
                <div class="small-slot"><span class="slot-label">Lib</span><div id="c-lib-num" style="font-weight:bold">0</div></div>
                <div class="small-slot" id="c-cmd-zone"><span class="slot-label">Cmd</span></div>
            </div>
            <div class="life-box" style="color:var(--cpu-red)">CPU: 40</div>
            <button class="mox-btn btn-ai" onclick="aiAction()">AI MOVE</button>
            <div class="zones-row" style="margin-top:auto">
                <div class="small-slot"><span class="slot-label">Grave</span></div>
                <div class="small-slot"><span class="slot-label">Exile</span></div>
            </div>
        </div>
    </div>

    <div class="player-area user-area">
        <div class="field">
            <div class="card-row" id="p-creatures"></div>
            <div class="card-row" id="p-lands"></div>
        </div>
        <div class="sidebar">
            <div class="zones-row">
                <div class="small-slot"><span class="slot-label">Exile</span></div>
                <div class="small-slot"><span class="slot-label">Grave</span></div>
            </div>
            <div class="life-box" style="color:var(--mox-blue)">YOU: 40</div>
            <button class="mox-btn btn-orange" onclick="draw('p')">DRAW CARD</button>
            <div class="zones-row" style="margin-top:10px">
                <div class="small-slot" id="p-cmd-zone"><span class="slot-label">Cmd</span></div>
                <div class="small-slot"><span class="slot-label">Lib</span><div id="p-lib-num" style="font-weight:bold">0</div></div>
            </div>
            <button class="mox-btn btn-blue" id="phase-btn" onclick="nextPhase()">FASE: Iniziale</button>
        </div>
    </div>
</div>

<div id="the-stack"></div>

<script>
    let decks = { p: [], c: [] };
    const phaseList = [
        "Iniziale", "STAP", "Mantenimento", "Acquisizione", 
        "Principale 1", "Inizio Combattimento", "Dichiarazione Attaccanti", 
        "Dichiarazione Bloccanti", "Assegnazione Danno", "Fine Combattimento", 
        "Principale 2", "Fase Finale", "Sottofase Finale"
    ];
    let currentPhaseIdx = 0;

    async function initGame() {
        document.querySelectorAll('.card-row').forEach(r => r.innerHTML = '');
        const pData = await fetchDeck(document.getElementById('pUrl').value);
        const cData = await fetchDeck(document.getElementById('cUrl').value);
        
        decks.p = pData.main; decks.c = cData.main;
        if(pData.cmdr) spawnCard(pData.cmdr, 'p-cmd-zone');
        if(cData.cmdr) spawnCard(cData.cmdr, 'c-cmd-zone');
        
        for(let i=0; i<7; i++) draw('p');
        updateCounters();
    }

    async function fetchDeck(url) {
        const id = url.split('/decks/')[1]?.split('?')[0];
        const r = await fetch(`https://corsproxy.io/?${encodeURIComponent('https://api.moxfield.com/v2/decks/all/'+id)}`).then(res => res.json());
        let main = [];
        Object.values(r.mainboard).forEach(c => { for(let i=0; i<c.quantity; i++) main.push(c.card.name); });
        return { main: main.sort(() => Math.random() - 0.5), cmdr: r.commanders ? Object.values(r.commanders)[0].card.name : null };
    }

    function spawnCard(name, zoneId) {
        const div = document.createElement('div');
        div.className = 'card';
        div.draggable = true;
        div.innerHTML = `<img src="https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=image">`;
        div.ondblclick = () => div.classList.toggle('tapped');
        div.ondragstart = () => div.classList.add('dragging');
        div.ondragend = () => div.classList.remove('dragging');
        document.getElementById(zoneId).appendChild(div);
        return div;
    }

    function draw(who) {
        if(decks[who].length > 0) {
            spawnCard(decks[who].pop(), who === 'p' ? 'p-creatures' : 'c-creatures');
            updateCounters();
        }
    }

    function aiAction() {
        if(decks.c.length === 0) return;
        const stack = document.getElementById('the-stack');
        const name = decks.c.pop();
        stack.classList.add('active');
        const c = spawnCard(name, 'the-stack');
        
        setTimeout(() => {
            const isLand = name.toLowerCase().includes("land") || name.toLowerCase().includes("swamp") || name.toLowerCase().includes("island");
            document.getElementById(isLand ? 'c-lands' : 'c-creatures').appendChild(c);
            stack.classList.remove('active');
            updateCounters();
        }, 1200);
    }

    function nextPhase() {
        currentPhaseIdx = (currentPhaseIdx + 1) % phaseList.length;
        document.getElementById('phase-btn').innerText = "FASE: " + phaseList[currentPhaseIdx];
        if(currentPhaseIdx === 1) document.querySelectorAll('.tapped').forEach(c => c.classList.remove('tapped'));
    }

    function updateCounters() {
        document.getElementById('p-lib-num').innerText = decks.p.length;
        document.getElementById('c-lib-num').innerText = decks.c.length;
    }

    document.querySelectorAll('.card-row, .small-slot').forEach(z => {
        z.ondragover = e => e.preventDefault();
        z.ondrop = () => {
            const d = document.querySelector('.dragging');
            if(d) z.appendChild(d);
        };
    });
</script>
</body>
</html>
